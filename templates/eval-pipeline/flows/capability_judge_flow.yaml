metadata:
  name: Capability Judge Flow
  description: >
    LLM-as-judge flow that scores agent reasoning quality across 7 capability
    dimensions. Evaluates cross_dataset_reasoning, methodology_awareness,
    scope_adherence, causal_inference_boundaries, geographic_resolution_knowledge,
    terminology_fluency, and confidence_calibration using the agent's reasoning
    block, final answer, and tool interactions.
  version: 1.0.0
  license: Apache-2.0
  recommended_models:
    default: openai/gpt-4o
    compatible:
      - openai/gpt-4o
      - anthropic/claude-sonnet-4
  tags:
    - evaluation
    - llm-as-judge
    - capability
  dataset_requirements:
    required_columns:
      - question
      - question_type
      - can_server_answer
      - evaluation_criteria
      - good_answer
      - relevant_capabilities
      - gold_standard_reasoning
      - agent_reasoning
      - agent_answer
      - tool_interactions
    description: >
      Input dataset with agent evaluation results. Each row must contain
      the question, gold standard fields, and the agent's reasoning and answer.
blocks:
  - block_type: PromptBuilderBlock
    block_config:
      block_name: build_capability_judge_prompt
      input_cols:
        question: question
        question_type: question_type
        can_server_answer: can_server_answer
        evaluation_criteria: evaluation_criteria
        good_answer: good_answer
        relevant_capabilities: relevant_capabilities
        gold_standard_reasoning: gold_standard_reasoning
        agent_reasoning: agent_reasoning
        agent_answer: agent_answer
        tool_interactions: tool_interactions
      output_cols: capability_judge_messages
      prompt_config_path: prompts/capability_judge.yaml
  - block_type: LLMChatBlock
    block_config:
      block_name: run_capability_judge
      input_cols: capability_judge_messages
      output_cols: capability_judge_response
      async_mode: true
      temperature: 0.0
      max_tokens: 4096
      response_format:
        type: json_object
  - block_type: LLMResponseExtractorBlock
    block_config:
      block_name: extract_capability_judge
      input_cols: capability_judge_response
      field_prefix: capability_judge_
      extract_content: true
  - block_type: JSONParserBlock
    block_config:
      block_name: parse_capability_scores
      input_cols: capability_judge_content
      output_cols:
        - cross_dataset_reasoning
        - cross_dataset_reasoning_evaluation
        - methodology_awareness
        - methodology_awareness_evaluation
        - scope_adherence
        - scope_adherence_evaluation
        - causal_inference_boundaries
        - causal_inference_boundaries_evaluation
        - geographic_resolution_knowledge
        - geographic_resolution_knowledge_evaluation
        - terminology_fluency
        - terminology_fluency_evaluation
        - confidence_calibration
        - confidence_calibration_evaluation
        - overall_assessment
      expand_fields: true
