# SpiceDB Operator OpenShift Install
#
# Step 1: Install the operator (run once per cluster)
#   oc apply --server-side -f https://github.com/authzed/spicedb-operator/releases/latest/download/bundle.yaml
#
# Step 2: Apply OpenShift fixes (SCC + memory)
#   oc apply --server-side -f deploy/spicedb/operator-install.yaml
#
---
# Grant nonroot-v2 SCC so the operator can run as UID 65532
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: spicedb-operator-nonroot-scc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:nonroot-v2
subjects:
  - kind: ServiceAccount
    name: spicedb-operator
    namespace: spicedb-operator
