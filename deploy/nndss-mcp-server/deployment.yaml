apiVersion: apps/v1
kind: Deployment
metadata:
  name: nndss-mcp-server
  labels:
    app.kubernetes.io/name: nndss-mcp-server
  annotations:
    haproxy.router.openshift.io/timeout: "600s"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nndss-mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nndss-mcp-server
    spec:
      containers:
        - name: mcp-server
          image: quay.io/eformat/nndss-mcp-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9090
              name: http
          env:
            - name: S3_ENDPOINT
              value: "http://minio.minio.svc.cluster.local:9000"
            - name: S3_ACCESS_KEY
              value: "minio"
            - name: S3_SECRET_KEY
              value: "minio1234"
            - name: S3_BUCKET
              value: "nndss-data"
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
