          \            mlflow.log_param(\"prompt_version\", prompt_version)\n    except\
          \ Exception as e:\n        print(f\"Could not load prompt from MLflow: {e}\"\
          , flush=True)\n\n    if not system_prompt:\n        print(\"Using fallback\
          \ prompt (not registered in MLflow)\", flush=True)\n        system_prompt\
          \ = (\n            \"You are an Australian disease surveillance data agent.\
          \ \"\n            \"Use query_trino to execute SQL against the NNDSS Iceberg\
          \ lakehouse. \"\n            \"Table: lakehouse.nndss.notifications (year\
          \ INT, state VARCHAR, disease VARCHAR, notifications INT). \"\n        \
          \    \"Diseases: 'Influenza (laboratory confirmed)', 'Invasive meningococcal\
          \ disease', 'Invasive pneumococcal disease', 'Salmonellosis'. \"\n     \
          \       \"Table: lakehouse.nndss.population (year INT, state VARCHAR, population\
          \ INT) for per-capita rates. \"\n            \"Always include Data Confidence\
          \ (HIGH/MODERATE/LOW) and Data Freshness in your response. \"\n        \
          \    \"Notifications are laboratory-confirmed cases from passive surveillance,\
          \ not total infections.\"\n        )\n\n    agent = create_react_agent(\n\
          \        model=agent_llm,\n        tools=[query_trino, describe_datasets,\
          \ get_methodology],\n        prompt=system_prompt,\n    )\n\n    _q_count\
          \ = [0]\n\n    def predict_fn(question: str) -> str:\n        _q_count[0]\
          \ += 1\n        print(f\"[predict {_q_count[0]}] Q: {question[:80]}...\"\
          , flush=True)\n        try:\n            with mlflow.start_span(name=\"\
          nndss_agent_eval\") as span:\n                span.set_inputs({\"question\"\
          : question[:200]})\n                mlflow.genai.load_prompt(\n        \
          \            f\"prompts:/{prompt_name}@production\",\n                 \
          \   allow_missing=True,\n                    cache_ttl_seconds=300,\n  \
          \              )\n                result = agent.invoke({\"messages\": [HumanMessage(content=question)]})\n\
          \                for m in reversed(result.get(\"messages\", [])):\n    \
          \                if hasattr(m, \"type\") and m.type == \"ai\" and not getattr(m,\
          \ \"tool_calls\", None):\n                        answer = m.content or\
          \ \"\"\n                        span.set_outputs({\"answer_length\": len(answer)})\n\
          \                        print(f\"[predict {_q_count[0]}] A: {len(answer)}\
          \ chars\", flush=True)\n                        return answer\n        \
          \    print(f\"[predict {_q_count[0]}] No AI response found\", flush=True)\n\
          \            return \"No response\"\n        except Exception as e:\n  \
          \          print(f\"[predict {_q_count[0]}] Error: {e}\", flush=True)\n\
          \            return f\"Error: {e}\"\n\n    # -------------------------------------------------------------------------\n\
          \    # Run evaluation\n    # -------------------------------------------------------------------------\n\
          \    dataset = get_dataset(dataset_id=dataset_id)\n    print(f\"Dataset:\
