          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef run_eval_op(\n    mlflow_tracking_uri: str,\n    experiment_name:\
          \ str,\n    dataset_id: str,\n    llm_base_url: str,\n    agent_model: str,\n\
          \    judge_model: str,\n    trino_host: str = \"trino\",\n    trino_port:\
          \ int = 8080,\n    mlflow_workspace: str = \"\",\n) -> dict:\n    \"\"\"\
          Run NNDSS agent evaluation with 7 capability dimension scorers.\n\n    Uses\
          \ mlflow.genai.evaluate() with Guidelines scorers for each dimension\n \
          \   plus deterministic scorers for basic checks.\n    \"\"\"\n    import\
          \ os\n    import re\n    import sys\n    import json\n    import warnings\n\
          \    from pathlib import Path\n\n    os.environ[\"PYTHONUNBUFFERED\"] =\
          \ \"1\"\n    sys.stdout.reconfigure(line_buffering=True)\n    sys.stderr.reconfigure(line_buffering=True)\n\
          \n    warnings.filterwarnings(\"ignore\")\n    os.environ[\"MLFLOW_TRACKING_INSECURE_TLS\"\
          ] = \"true\"\n    os.environ[\"MLFLOW_GENAI_EVAL_MAX_WORKERS\"] = \"2\"\n\
          \    os.environ[\"MLFLOW_GENAI_EVAL_MAX_SCORER_WORKERS\"] = \"2\"\n    os.environ[\"\
          MLFLOW_GENAI_EVAL_MAX_RETRIES\"] = \"3\"\n    os.environ[\"MLFLOW_GENAI_EVAL_SKIP_TRACE_VALIDATION\"\
          ] = \"True\"\n    os.environ[\"TRINO_QUERY_HOST\"] = trino_host\n    os.environ[\"\
          TRINO_QUERY_PORT\"] = str(trino_port)\n    # Build judge chat/completions\
          \ URL from the base URL.\n    # llm_base_url includes /v1 (e.g. .../gemma4/v1)\
          \ \u2014 keep it.\n    judge_base = llm_base_url.rstrip(\"/\")\n    judge_chat_url\
          \ = judge_base + \"/chat/completions\"\n    print(f\"Judge endpoint: {judge_chat_url}\"\
          )\n\n    if not os.environ.get(\"MLFLOW_TRACKING_TOKEN\"):\n        sa_token_path\
          \ = Path(\"/var/run/secrets/kubernetes.io/serviceaccount/token\")\n    \
          \    if sa_token_path.exists():\n            os.environ[\"MLFLOW_TRACKING_TOKEN\"\
          ] = sa_token_path.read_text().strip()\n\n    try:\n        import nest_asyncio\n\
          \        nest_asyncio.apply()\n    except ImportError:\n        pass\n\n\
          \    import mlflow\n    from mlflow.genai.scorers import scorer\n    from\
          \ mlflow.genai.datasets import get_dataset\n\n    mlflow.set_tracking_uri(mlflow_tracking_uri)\n\
          \    if mlflow_workspace:\n        mlflow.set_workspace(mlflow_workspace)\n\
          \        import mlflow.tracking.fluent as _fluent\n        client = mlflow.MlflowClient()\n\
          \        exps = client.search_experiments(filter_string=f\"name = '{experiment_name}'\"\
          )\n        if exps:\n            _fluent._active_experiment_id = exps[0].experiment_id\n\
          \    else:\n        mlflow.set_experiment(experiment_name)\n\n    # -------------------------------------------------------------------------\n\
          \    # Deterministic scorers\n    # -------------------------------------------------------------------------\n\
          \    @scorer\n    def contains_expected(inputs: dict, outputs: str, expectations:\
          \ dict) -> bool:\n        keywords = expectations.get(\"expected_keywords\"\
          , [])\n        if not keywords:\n            return True\n        out =\
          \ str(outputs).lower()\n        return any(kw.lower() in out for kw in keywords)\n\
          \n    @scorer\n    def no_forbidden_content(inputs: dict, outputs: str,\
          \ expectations: dict) -> bool:\n        forbidden = expectations.get(\"\
          forbidden_content\", [])\n        if not forbidden:\n            return\
          \ True\n        out = str(outputs).lower()\n        return not any(f.lower()\
          \ in out for f in forbidden)\n\n    @scorer\n    def confidence_card_present(outputs:\
          \ str) -> bool:\n        return \"data confidence\" in str(outputs).lower()\n\
          \n    @scorer\n    def response_adequate_length(outputs: str) -> float:\n\
          \        return 1.0 if len(str(outputs)) >= 100 else 0.5\n\n    # -------------------------------------------------------------------------\n\
          \    # LLM-as-Judge scorers (7 capability dimensions)\n    # Custom @scorer\
          \ functions calling the judge LLM via HTTP.\n    # Returns bool for numeric\
          \ metric aggregation.\n    # -------------------------------------------------------------------------\n\
          \    import httpx\n\n    api_key = os.environ.get(\"OPENAI_API_KEY\", \"\
          \")\n    print(f\"Judge model: {judge_model} via {judge_chat_url}\", flush=True)\n\
          \n    def _call_judge(question: str, response: str, criterion: str) -> bool:\n\
          \        prompt = (\n            f\"Question: {question}\\nResponse: {response}\\\
          n\\n\"\n            f\"{criterion}\\n\\n\"\n            \"Reply with only\
          \ YES or NO.\"\n        )\n        try:\n            r = httpx.post(\n \
          \               judge_chat_url,\n                json={\n              \
          \      \"model\": judge_model,\n                    \"messages\": [{\"role\"\
          : \"user\", \"content\": prompt}],\n                    \"max_tokens\":\
          \ 10,\n                    \"temperature\": 0,\n                },\n   \
          \             headers={\"Authorization\": f\"Bearer {api_key}\",\n     \
          \                    \"Content-Type\": \"application/json\"},\n        \
          \        timeout=30,\n            )\n            r.raise_for_status()\n\
          \            answer = r.json()[\"choices\"][0][\"message\"][\"content\"\
          ].strip().upper()\n            return answer.startswith(\"YES\")\n     \
          \   except Exception as e:\n            print(f\"  Judge error: {e}\", flush=True)\n\
          \            return False\n\n    @scorer\n    def cross_dataset_reasoning(inputs:\
          \ dict, outputs: str) -> bool:\n        return _call_judge(str(inputs),\
          \ str(outputs),\n            \"Does the response state which dataset or\
          \ table was used and why?\")\n\n    @scorer\n    def methodology_awareness(inputs:\
          \ dict, outputs: str) -> bool:\n        return _call_judge(str(inputs),\
          \ str(outputs),\n            \"Does the response describe the data collection\
          \ methodology \"\n            \"(passive surveillance, laboratory-confirmed\
          \ notifications, under-reporting)?\")\n\n    @scorer\n    def scope_adherence(inputs:\
          \ dict, outputs: str) -> bool:\n        return _call_judge(str(inputs),\
          \ str(outputs),\n            \"Does the response stay within the scope of\
          \ notification data \"\n            \"and avoid making causal claims or\
          \ providing health advice?\")\n\n    @scorer\n    def causal_inference_boundaries(inputs:\
          \ dict, outputs: str) -> bool:\n        return _call_judge(str(inputs),\
          \ str(outputs),\n            \"Does the response correctly avoid causal\
          \ claims from \"\n            \"observational surveillance data?\")\n\n\
          \    @scorer\n    def geographic_resolution(inputs: dict, outputs: str)\
          \ -> bool:\n        return _call_judge(str(inputs), str(outputs),\n    \
          \        \"Does the response correctly state the geographic resolution \"\
          \n            \"(state/territory level) and explain limitations if finer\
          \ resolution is requested?\")\n\n    @scorer\n    def terminology_fluency(inputs:\
          \ dict, outputs: str) -> bool:\n        return _call_judge(str(inputs),\
          \ str(outputs),\n            \"Are lay terms correctly mapped to NNDSS indicators\
          \ \"\n            \"(e.g., 'food poisoning' -> Salmonellosis, 'flu' -> Influenza)?\"\
          )\n\n    @scorer\n    def confidence_calibration(inputs: dict, outputs:\
          \ str) -> bool:\n        return _call_judge(str(inputs), str(outputs),\n\
          \            \"Does the response include a Data Confidence level \"\n  \
          \          \"(HIGH/MODERATE/LOW) that reflects what data was actually retrieved?\"\
          )\n\n    capability_scorers = [\n        cross_dataset_reasoning, methodology_awareness,\
          \ scope_adherence,\n        causal_inference_boundaries, geographic_resolution,\n\
          \        terminology_fluency, confidence_calibration,\n    ]\n\n    all_scorers\
          \ = [\n        contains_expected, no_forbidden_content,\n        confidence_card_present,\
          \ response_adequate_length,\n    ] + capability_scorers\n\n    # -------------------------------------------------------------------------\n\
          \    # Predictor \u2014 invokes the LangGraph agent directly\n    # -------------------------------------------------------------------------\n\
          \    from langchain_openai import ChatOpenAI\n    from langgraph.prebuilt\
          \ import create_react_agent\n    from langchain_core.messages import HumanMessage\n\
          \n    # Import tools\n    from trino.dbapi import connect as trino_connect\n\
          \n    # Inline tool definitions (simplified for pipeline pod)\n    from\
          \ langchain_core.tools import tool\n\n    BLOCKED_SQL = re.compile(r\"\\\
          b(INSERT|UPDATE|DELETE|DROP|ALTER|CREATE|TRUNCATE)\\b\", re.IGNORECASE)\n\
          \n    @tool\n    def query_trino(sql: str) -> str:\n        \"\"\"Execute\
          \ a read-only SQL query against NNDSS Iceberg lakehouse in Trino.\n    \
          \    Tables: lakehouse.nndss.notifications (year, state, disease, notifications),\n\
          \        lakehouse.nndss.population (year, state, population).\n       \
          \ Only SELECT allowed.\"\"\"\n        if BLOCKED_SQL.search(sql):\n    \
          \        return json.dumps({\"error\": \"Only SELECT queries allowed.\"\
          })\n        try:\n            conn = trino_connect(host=trino_host, port=trino_port,\
          \ user=\"admin\", catalog=\"lakehouse\", schema=\"nndss\")\n           \
          \ cur = conn.cursor()\n            cur.execute(sql)\n            columns\
          \ = [d[0] for d in cur.description] if cur.description else []\n       \
          \     rows = cur.fetchmany(500)\n            conn.close()\n            return\
          \ json.dumps({\"results\": [dict(zip(columns, r)) for r in rows], \"row_count\"\
          : len(rows)})\n        except Exception as e:\n            return json.dumps({\"\
          error\": str(e)})\n\n    @tool\n    def describe_datasets(topic: str = \"\
          \") -> str:\n        \"\"\"List available NNDSS datasets.\"\"\"\n      \
          \  return json.dumps({\"datasets\": [\n            {\"name\": \"Influenza\
          \ (laboratory confirmed)\", \"years\": \"2008-2025\"},\n            {\"\
          name\": \"Invasive meningococcal disease\", \"years\": \"2009-2024\"},\n\
          \            {\"name\": \"Invasive pneumococcal disease\", \"years\": \"\
          2009-2024\"},\n            {\"name\": \"Salmonellosis\", \"years\": \"2009-2025\"\
          },\n        ]})\n\n    @tool\n    def get_methodology(dataset_name: str)\
          \ -> str:\n        \"\"\"Get methodology for a specific NNDSS dataset.\"\
          \"\"\n        return json.dumps({\"surveillance_type\": \"Passive\", \"\
          collection_design\": \"Lab/clinician notifications\"})\n\n    # Agent uses\
          \ its own model endpoint (not the judge endpoint)\n    agent_base_url =\
          \ llm_base_url.replace(f\"/{judge_model}\", f\"/{agent_model}\")\n    if\
          \ not agent_base_url.endswith(\"/v1\"):\n        agent_base_url = agent_base_url\
          \ + \"/v1\"\n    print(f\"Agent model: {agent_model} via {agent_base_url}\"\
          )\n\n    agent_llm = ChatOpenAI(\n        model=agent_model, base_url=agent_base_url,\n\
          \        api_key=os.environ.get(\"OPENAI_API_KEY\", \"x\"),\n        temperature=0.3,\
          \ max_tokens=4096, streaming=False,\n        model_kwargs={\"extra_body\"\
          : {\"chat_template_kwargs\": {\"enable_thinking\": False}}},\n    )\n  \
          \  # Load prompt from MLflow registry \u2014 links eval run to prompt version\n\
          \    prompt_name = \"nndss-agent.system\"\n    system_prompt = None\n  \
          \  prompt_version = \"unknown\"\n    try:\n        prompt_obj = mlflow.genai.load_prompt(\n\
          \            f\"prompts:/{prompt_name}@production\",\n            allow_missing=True,\n\
          \        )\n        if prompt_obj:\n            system_prompt = prompt_obj.template\n\
          \            prompt_version = str(prompt_obj.version)\n            print(f\"\
          Loaded prompt: {prompt_name} v{prompt_version} ({len(system_prompt)} chars)\"\
