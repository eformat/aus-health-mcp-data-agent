pipelineInfo:
  description: Evaluate NNDSS agent on 7 capability dimensions using LLM-as-judge
  name: nndss-health-agent-evaluation
root:
  dag:
    tasks:
      create-dataset-op:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-create-dataset-op
        dependentTasks:
        - setup-mlflow-op
        inputs:
          parameters:
            dataset_name:
              componentInputParameter: dataset_name
            experiment_name:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: setup-mlflow-op
            mlflow_tracking_uri:
              componentInputParameter: mlflow_tracking_uri
            mlflow_workspace:
              componentInputParameter: mlflow_workspace
        taskInfo:
          name: create-dataset-op
      generate-variants-op:
        cachingOptions: {}
        componentRef:
          name: comp-generate-variants-op
        dependentTasks:
        - create-dataset-op
        inputs:
          parameters:
            dataset_id:
              taskOutputParameter:
                outputParameterKey: dataset_id
                producerTask: create-dataset-op
            experiment_name:
              taskOutputParameter:
                outputParameterKey: experiment_name
                producerTask: create-dataset-op
            gen_model:
              componentInputParameter: judge_model
            llm_base_url:
              componentInputParameter: llm_base_url
            mlflow_tracking_uri:
              componentInputParameter: mlflow_tracking_uri
            mlflow_workspace:
              componentInputParameter: mlflow_workspace
            variants_per_seed:
              runtimeValue:
                constant: 3.0
        taskInfo:
          name: generate-variants-op
      report-results-op:
        cachingOptions:
          enableCache: true
