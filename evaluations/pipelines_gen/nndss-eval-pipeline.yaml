# PIPELINE DEFINITION
# Name: nndss-health-agent-evaluation
# Description: Evaluate NNDSS agent on 7 capability dimensions using LLM-as-judge
# Inputs:
#    agent_model: str [Default: 'qwen36-27b']
#    dataset_name: str [Default: 'nndss_health_eval']
#    judge_model: str [Default: 'gemma4']
#    llm_base_url: str [Default: 'http://maas.apps.ocp.cloud.rhai-tmm.dev/prelude-maas/gemma4/v1']
#    llm_secret_name: str [Default: 'nndss-agent-maas-key']
#    mlflow_experiment_name: str [Default: 'nndss-data-agent']
#    mlflow_tracking_uri: str [Default: 'https://mlflow.redhat-ods-applications.svc:8443/mlflow']
#    mlflow_workspace: str [Default: 'nndss-agent']
#    trino_host: str [Default: 'trino.nndss-agent.svc.cluster.local']
#    trino_port: int [Default: 8080.0]
components:
  comp-create-dataset-op:
    executorLabel: exec-create-dataset-op
    inputDefinitions:
      parameters:
        dataset_name:
          parameterType: STRING
        experiment_name:
          parameterType: STRING
        mlflow_tracking_uri:
          parameterType: STRING
        mlflow_workspace:
          defaultValue: ''
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        dataset_id:
          parameterType: STRING
        experiment_name:
          parameterType: STRING
  comp-generate-variants-op:
    executorLabel: exec-generate-variants-op
    inputDefinitions:
      parameters:
        dataset_id:
          parameterType: STRING
        experiment_name:
          parameterType: STRING
        gen_model:
          parameterType: STRING
        llm_base_url:
          parameterType: STRING
        mlflow_tracking_uri:
          parameterType: STRING
        mlflow_workspace:
          defaultValue: ''
          isOptional: true
          parameterType: STRING
        variants_per_seed:
          defaultValue: 3.0
          isOptional: true
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      parameters:
        dataset_id:
          parameterType: STRING
        experiment_name:
          parameterType: STRING
  comp-report-results-op:
    executorLabel: exec-report-results-op
    inputDefinitions:
      parameters:
        metrics:
          parameterType: STRUCT
        mlflow_tracking_uri:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-run-eval-op:
    executorLabel: exec-run-eval-op
    inputDefinitions:
      parameters:
        agent_model:
          parameterType: STRING
        dataset_id:
          parameterType: STRING
        experiment_name:
          parameterType: STRING
        judge_model:
          parameterType: STRING
        llm_base_url:
          parameterType: STRING
        mlflow_tracking_uri:
          parameterType: STRING
        mlflow_workspace:
          defaultValue: ''
          isOptional: true
          parameterType: STRING
        trino_host:
          defaultValue: trino
          isOptional: true
          parameterType: STRING
        trino_port:
          defaultValue: 8080.0
          isOptional: true
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRUCT
  comp-setup-mlflow-op:
    executorLabel: exec-setup-mlflow-op
    inputDefinitions:
      parameters:
        mlflow_experiment_name:
          parameterType: STRING
        mlflow_tracking_uri:
          parameterType: STRING
        mlflow_workspace:
          defaultValue: ''
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-create-dataset-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - create_dataset_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'mlflow>=3.10'\
          \ 'nest-asyncio>=1.6.0' 'pydantic>=2.0.0' 'httpx>=0.27.0'  &&  python3 -m\
          \ pip install --quiet --no-warn-script-location 'kfp==2.16.1' '--no-deps'\
          \ 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"$0\" \"$@\"\
          \n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef create_dataset_op(\n    mlflow_tracking_uri: str,\n    experiment_name:\
          \ str,\n    dataset_name: str,\n    mlflow_workspace: str = \"\",\n) ->\
          \ NamedTuple(\"DatasetOutput\", [(\"experiment_name\", str), (\"dataset_id\"\
          , str)]):\n    \"\"\"Create NNDSS evaluation dataset in MLflow.\"\"\"\n\
          \    import os\n    from typing import NamedTuple\n    from pathlib import\
          \ Path\n    import mlflow\n    from mlflow.genai.datasets import create_dataset\n\
          \n    os.environ[\"MLFLOW_TRACKING_INSECURE_TLS\"] = \"true\"\n    if not\
          \ os.environ.get(\"MLFLOW_TRACKING_TOKEN\"):\n        sa_token_path = Path(\"\
          /var/run/secrets/kubernetes.io/serviceaccount/token\")\n        if sa_token_path.exists():\n\
          \            os.environ[\"MLFLOW_TRACKING_TOKEN\"] = sa_token_path.read_text().strip()\n\
          \n    mlflow.set_tracking_uri(mlflow_tracking_uri)\n    if mlflow_workspace:\n\
          \        mlflow.set_workspace(mlflow_workspace)\n        import mlflow.tracking.fluent\
          \ as _fluent\n        client = mlflow.MlflowClient()\n        exps = client.search_experiments(filter_string=f\"\
          name = '{experiment_name}'\")\n        if exps:\n            _fluent._active_experiment_id\
          \ = exps[0].experiment_id\n    else:\n        mlflow.set_experiment(experiment_name)\n\
          \n    # 20 seed questions (10 annual + 10 fortnightly) \u2014 SDG Hub generates\
          \ variants\n    test_cases = [\n        # --- Annual notifications (10)\
          \ ---\n        {\"inputs\": {\"question\": \"How many influenza cases were\
          \ notified in NSW in 2023?\"}, \"expectations\": {\"expected_keywords\"\
          : [\"notifications\", \"laboratory-confirmed\"], \"question_type\": \"data_retrieval\"\
          }},\n        {\"inputs\": {\"question\": \"Which state had the highest salmonellosis\
          \ notifications in 2022?\"}, \"expectations\": {\"expected_keywords\": [\"\
          salmonellosis\"], \"question_type\": \"data_retrieval\"}},\n        {\"\
          inputs\": {\"question\": \"Compare influenza and pneumococcal disease notification\
          \ trends over the past 5 years\"}, \"expectations\": {\"expected_keywords\"\
          : [\"influenza\", \"pneumococcal\"], \"question_type\": \"cross_dataset\"\
          }},\n        {\"inputs\": {\"question\": \"What is the meningococcal disease\
          \ rate per 100,000 in Victoria?\"}, \"expectations\": {\"expected_keywords\"\
          : [\"per 100,000\", \"population\"], \"question_type\": \"scope_boundary\"\
          }},\n        {\"inputs\": {\"question\": \"Does vaccination cause the decline\
          \ in pertussis notifications?\"}, \"expectations\": {\"expected_keywords\"\
          : [\"cannot\", \"causal\"], \"question_type\": \"scope_boundary\", \"forbidden_content\"\
          : [\"yes, vaccination causes\"]}},\n        {\"inputs\": {\"question\":\
          \ \"What are the influenza notifications in the Sydney LGA?\"}, \"expectations\"\
          : {\"expected_keywords\": [\"state\", \"territory\"], \"question_type\"\
          : \"geographic_resolution\"}},\n        {\"inputs\": {\"question\": \"How\
          \ does NNDSS collect influenza data compared to sentinel surveillance?\"\
          }, \"expectations\": {\"expected_keywords\": [\"passive\", \"surveillance\"\
          ], \"question_type\": \"methodology_comparison\"}},\n        {\"inputs\"\
          : {\"question\": \"What food poisoning cases were reported in Queensland\
          \ last year?\"}, \"expectations\": {\"expected_keywords\": [\"salmonellosis\"\
          ], \"question_type\": \"data_retrieval\"}},\n        {\"inputs\": {\"question\"\
          : \"Should I get vaccinated against meningococcal disease based on the notification\
          \ data?\"}, \"expectations\": {\"expected_keywords\": [\"cannot\", \"health\
          \ advice\"], \"question_type\": \"scope_boundary\", \"forbidden_content\"\
          : [\"you should get vaccinated\"]}},\n        {\"inputs\": {\"question\"\
          : \"Are influenza notifications increasing because of climate change?\"\
          }, \"expectations\": {\"expected_keywords\": [\"cannot\", \"causal\"], \"\
          question_type\": \"scope_boundary\", \"forbidden_content\": [\"climate change\
          \ causes\"]}},\n        # --- Fortnightly notifications (10) ---\n     \
          \   {\"inputs\": {\"question\": \"What are the latest fortnightly COVID-19\
          \ notifications by state?\"}, \"expectations\": {\"expected_keywords\":\
          \ [\"COVID-19\", \"fortnightly\"], \"question_type\": \"data_retrieval\"\
          }},\n        {\"inputs\": {\"question\": \"Compare RSV and influenza fortnightly\
          \ notification trends in 2024\"}, \"expectations\": {\"expected_keywords\"\
          : [\"RSV\", \"influenza\", \"fortnightly\"], \"question_type\": \"cross_dataset\"\
          }},\n        {\"inputs\": {\"question\": \"Show the fortnightly pertussis\
          \ notifications across all states in 2025\"}, \"expectations\": {\"expected_keywords\"\
          : [\"pertussis\", \"fortnightly\"], \"question_type\": \"data_retrieval\"\
          }},\n        {\"inputs\": {\"question\": \"Which disease group had the highest\
          \ fortnightly notifications in the latest reporting period?\"}, \"expectations\"\
          : {\"expected_keywords\": [\"disease_group\", \"fortnightly\"], \"question_type\"\
          : \"data_retrieval\"}},\n        {\"inputs\": {\"question\": \"What are\
          \ the measles fortnightly notifications by state in 2024-2025?\"}, \"expectations\"\
          : {\"expected_keywords\": [\"measles\", \"fortnightly\"], \"question_type\"\
          : \"data_retrieval\"}},\n        {\"inputs\": {\"question\": \"How do fortnightly\
          \ hepatitis B notifications compare across states?\"}, \"expectations\"\
          : {\"expected_keywords\": [\"hepatitis\", \"fortnightly\"], \"question_type\"\
          : \"cross_dataset\"}},\n        {\"inputs\": {\"question\": \"Is there a\
          \ seasonal pattern in fortnightly dengue notifications?\"}, \"expectations\"\
          : {\"expected_keywords\": [\"dengue\", \"fortnightly\"], \"question_type\"\
          : \"data_retrieval\"}},\n        {\"inputs\": {\"question\": \"Did COVID-19\
          \ cause the increase in fortnightly RSV notifications in 2024?\"}, \"expectations\"\
          : {\"expected_keywords\": [\"cannot\", \"causal\"], \"question_type\": \"\
          scope_boundary\", \"forbidden_content\": [\"COVID caused\"]}},\n       \
          \ {\"inputs\": {\"question\": \"What are the fortnightly chlamydia notifications\
          \ in the Darwin region?\"}, \"expectations\": {\"expected_keywords\": [\"\
          state\", \"territory\"], \"question_type\": \"geographic_resolution\"}},\n\
          \        {\"inputs\": {\"question\": \"Compare the fortnightly tuberculosis\
          \ and measles notification trends in 2025\"}, \"expectations\": {\"expected_keywords\"\
          : [\"tuberculosis\", \"measles\", \"fortnightly\"], \"question_type\": \"\
          cross_dataset\"}},\n    ]\n\n    # Each run gets its own dataset \u2014\
          \ no mutation across runs\n    from datetime import datetime\n    run_ts\
          \ = datetime.now().strftime(\"%Y%m%d_%H%M%S\")\n    run_dataset_name = f\"\
          {dataset_name}_{run_ts}\"\n\n    dataset = create_dataset(\n        name=run_dataset_name,\n\
          \        tags={\"stage\": \"validation\", \"seeds\": str(len(test_cases)),\
          \ \"agent\": \"nndss-data-agent\"},\n    )\n    dataset = dataset.merge_records(test_cases)\n\
          \    print(f\"Dataset: {run_dataset_name} | {len(test_cases)} seeds | ID:\
          \ {dataset.dataset_id}\", flush=True)\n\n    DatasetOutput = NamedTuple(\"\
          DatasetOutput\", [(\"experiment_name\", str), (\"dataset_id\", str)])\n\
          \    return DatasetOutput(experiment_name=experiment_name, dataset_id=dataset.dataset_id)\n\
          \n"
        image: python:3.12-slim
    exec-generate-variants-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - generate_variants_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'mlflow>=3.10'\
          \ 'nest-asyncio>=1.6.0' 'pydantic>=2.0.0' 'httpx>=0.27.0' 'sdg-hub>=0.7.0,<1.0'\
          \ 'pandas>=2.0' 'pyyaml>=6.0'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.16.1' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef generate_variants_op(\n    mlflow_tracking_uri: str,\n    experiment_name:\
          \ str,\n    dataset_id: str,\n    llm_base_url: str,\n    gen_model: str,\n\
          \    variants_per_seed: int = 3,\n    mlflow_workspace: str = \"\",\n) ->\
          \ NamedTuple(\"GenOutput\", [(\"experiment_name\", str), (\"dataset_id\"\
          , str)]):\n    \"\"\"Generate question variants from seeds using SDG Hub.\"\
          \"\"\n    import os\n    import sys\n    import json\n    import tempfile\n\
          \    from typing import NamedTuple\n    from pathlib import Path\n\n   \
          \ os.environ[\"PYTHONUNBUFFERED\"] = \"1\"\n    sys.stdout.reconfigure(line_buffering=True)\n\
          \    os.environ[\"MLFLOW_TRACKING_INSECURE_TLS\"] = \"true\"\n\n    if not\
          \ os.environ.get(\"MLFLOW_TRACKING_TOKEN\"):\n        sa_token_path = Path(\"\
          /var/run/secrets/kubernetes.io/serviceaccount/token\")\n        if sa_token_path.exists():\n\
          \            os.environ[\"MLFLOW_TRACKING_TOKEN\"] = sa_token_path.read_text().strip()\n\
          \n    import mlflow\n    from mlflow.genai.datasets import get_dataset\n\
          \n    mlflow.set_tracking_uri(mlflow_tracking_uri)\n    if mlflow_workspace:\n\
          \        mlflow.set_workspace(mlflow_workspace)\n        import mlflow.tracking.fluent\
          \ as _fluent\n        client = mlflow.MlflowClient()\n        exps = client.search_experiments(filter_string=f\"\
          name = '{experiment_name}'\")\n        if exps:\n            _fluent._active_experiment_id\
          \ = exps[0].experiment_id\n    else:\n        mlflow.set_experiment(experiment_name)\n\
          \n    dataset = get_dataset(dataset_id=dataset_id)\n    df = dataset.to_df()\n\
          \    seed_count = len(df)\n    print(f\"Dataset: {dataset.name} | {seed_count}\
          \ seeds\", flush=True)\n\n    import pandas as pd\n    seeds = []\n    for\
          \ _, row in df.iterrows():\n        inputs = row.get(\"inputs\", {})\n \
          \       expectations = row.get(\"expectations\", {})\n        if isinstance(inputs,\
          \ str):\n            inputs = json.loads(inputs)\n        if isinstance(expectations,\
          \ str):\n            expectations = json.loads(expectations)\n        seeds.append({\n\
          \            \"question\": inputs.get(\"question\", \"\"),\n           \
          \ \"question_type\": expectations.get(\"question_type\", \"data_retrieval\"\
          ),\n            \"expected_keywords\": json.dumps(expectations.get(\"expected_keywords\"\
          , [])),\n        })\n    seed_df = pd.DataFrame(seeds)\n\n    # api_base\
          \ must include /v1 for litellm (used by SDG Hub)\n    gen_base = llm_base_url.rstrip(\"\
          /\")\n    if not gen_base.endswith(\"/v1\"):\n        gen_base = gen_base\
          \ + \"/v1\"\n    api_key = os.environ.get(\"OPENAI_API_KEY\", \"\")\n\n\
          \    # Create SDG Hub flow and prompt files in temp directory\n    work_dir\
          \ = Path(tempfile.mkdtemp())\n    prompts_dir = work_dir / \"prompts\"\n\
          \    prompts_dir.mkdir()\n\n    prompt_yaml = prompts_dir / \"question_gen.yaml\"\
          \n    import yaml as _yaml\n    prompt_config = [\n        {\n         \
          \   \"role\": \"system\",\n            \"content\": (\n                \"\
          You are an expert in Australian disease surveillance data. Generate evaluation\
          \ \"\n                \"questions for testing an NNDSS data agent.\\n\\\
          n\"\n                \"Available diseases: Influenza (laboratory confirmed),\
          \ Invasive meningococcal \"\n                \"disease, Invasive pneumococcal\
          \ disease, Salmonellosis.\\n\"\n                \"States: ACT, NSW, NT,\
          \ QLD, SA, TAS, VIC, WA.\\n\"\n                \"Data years: 2008-2025 (annual),\
          \ 2024-2026 (fortnightly).\\n\\n\"\n                \"Question types: data_retrieval,\
          \ cross_dataset, scope_boundary, \"\n                \"geographic_resolution,\
          \ methodology_comparison.\"\n            ),\n        },\n        {\n   \
          \         \"role\": \"user\",\n            \"content\": (\n            \
          \    \"{{ question_type }} question variant generation.\\n\\n\"\n      \
          \          \"Seed: {{ question }}\\n\"\n                \"Expected keywords:\
          \ {{ expected_keywords }}\\n\\n\"\n                \"Generate exactly 3\
          \ variant questions testing the same capability \"\n                \"but\
          \ with different disease, state, or year. For scope_boundary \"\n      \
          \          \"questions, create new out-of-scope questions.\\n\\n\"\n   \
          \             'Respond with a JSON object containing a \"variants\" array.\
          \ '\n                'Each variant needs: \"question\" (string), \"question_type\"\
          \ (string), '\n                '\"expected_keywords\" (array of strings).\
          \ No markdown, only valid JSON.'\n            ),\n        },\n    ]\n  \
          \  with open(prompt_yaml, \"w\") as f:\n        _yaml.dump(prompt_config,\
          \ f, default_flow_style=False)\n\n    flow_def = {\n        \"metadata\"\
          : {\n            \"name\": \"NNDSS Question Variant Generator\",\n     \
          \       \"version\": \"1.0.0\",\n            \"dataset_requirements\": {\n\
          \                \"required_columns\": [\"question\", \"question_type\"\
          , \"expected_keywords\"]\n            },\n        },\n        \"blocks\"\
          : [\n            {\n                \"block_type\": \"PromptBuilderBlock\"\
          ,\n                \"block_config\": {\n                    \"block_name\"\
          : \"build_prompt\",\n                    \"input_cols\": {\n           \
          \             \"question\": \"question\",\n                        \"question_type\"\
          : \"question_type\",\n                        \"expected_keywords\": \"\
          expected_keywords\",\n                    },\n                    \"output_cols\"\
          : \"gen_messages\",\n                    \"prompt_config_path\": str(prompt_yaml),\n\
          \                },\n            },\n            {\n                \"block_type\"\
          : \"LLMChatBlock\",\n                \"block_config\": {\n             \
          \       \"block_name\": \"generate\",\n                    \"input_cols\"\
          : \"gen_messages\",\n                    \"output_cols\": \"gen_response\"\
          ,\n                    \"async_mode\": True,\n                    \"temperature\"\
          : 0.7,\n                    \"max_tokens\": 1024,\n                },\n\
          \            },\n            {\n                \"block_type\": \"LLMResponseExtractorBlock\"\
          ,\n                \"block_config\": {\n                    \"block_name\"\
          : \"extract\",\n                    \"input_cols\": \"gen_response\",\n\
          \                    \"field_prefix\": \"gen_\",\n                    \"\
          extract_content\": True,\n                },\n            },\n        ],\n\
          \    }\n    flow_yaml_path = work_dir / \"question_gen_flow.yaml\"\n   \
          \ with open(flow_yaml_path, \"w\") as f:\n        _yaml.dump(flow_def, f)\n\
          \n    all_variants = []\n\n    try:\n        from sdg_hub.core.flow import\
          \ Flow\n        from pydantic import SecretStr\n\n        flow = Flow.from_yaml(str(flow_yaml_path))\n\
          \n        flow.set_model_config(\n            model=f\"openai/{gen_model}\"\
          ,\n            api_key=SecretStr(api_key),\n            api_base=gen_base,\n\
          \        )\n\n        print(f\"Running SDG Hub flow with model {gen_model}\
          \ via {gen_base}...\", flush=True)\n        result_df = flow.generate(\n\
          \            seed_df,\n            runtime_params={\n                \"\
          generate\": {\n                    \"api_key\": SecretStr(api_key),\n  \
          \                  \"api_base\": gen_base,\n                    \"model\"\
          : f\"openai/{gen_model}\",\n                }\n            },\n        \
          \    max_concurrency=2,\n        )\n        print(f\"SDG Hub output: {len(result_df)}\
          \ rows, columns: {list(result_df.columns)}\", flush=True)\n\n        content_col\
          \ = None\n        for col in result_df.columns:\n            if \"content\"\
          \ in col.lower():\n                content_col = col\n                break\n\
          \n        if content_col:\n            for _, row in result_df.iterrows():\n\
          \                try:\n                    raw = row[content_col]\n    \
          \                parsed = json.loads(raw) if isinstance(raw, str) else raw\n\
          \                    for v in parsed.get(\"variants\", [])[:variants_per_seed]:\n\
          \                        q = v.get(\"question\", \"\")\n               \
          \         if q:\n                            all_variants.append({\n   \
          \                             \"inputs\": {\"question\": q},\n         \
          \                       \"expectations\": {\n                          \
          \          \"expected_keywords\": v.get(\"expected_keywords\", []),\n  \
          \                                  \"question_type\": v.get(\"question_type\"\
          , \"data_retrieval\"),\n                                    \"forbidden_content\"\
          : v.get(\"forbidden_content\", []),\n                                },\n\
          \                            })\n                except Exception as e:\n\
          \                    print(f\"  Parse error: {e}\", flush=True)\n\n    \
          \    print(f\"Generated {len(all_variants)} variant questions via SDG Hub\"\
          , flush=True)\n\n    except Exception as e:\n        print(f\"SDG Hub error:\
          \ {e}\", flush=True)\n        print(\"Falling back to direct HTTP generation...\"\
          , flush=True)\n        import httpx\n        url = f\"{gen_base}/chat/completions\"\
          \n        for seed in seeds:\n            prompt = (\n                f\"\
          Generate {variants_per_seed} variant evaluation questions for an Australian\
          \ disease surveillance agent.\\n\\n\"\n                f\"Seed: {seed['question']}\\\
          nType: {seed['question_type']}\\n\\n\"\n                f\"Change the disease,\
          \ state, or year while keeping the same question type.\\n\\n\"\n       \
          \         f\"Respond with a JSON object containing a \\\"variants\\\" array.\
          \ \"\n                f\"Each variant needs: \\\"question\\\", \\\"question_type\\\
          \", \\\"expected_keywords\\\". No markdown.\"\n            )\n         \
          \   try:\n                r = httpx.post(url, json={\n                 \
          \   \"model\": gen_model,\n                    \"messages\": [{\"role\"\
          : \"user\", \"content\": prompt}],\n                    \"temperature\"\
          : 0.7, \"max_tokens\": 1024,\n                }, headers={\"Authorization\"\
          : f\"Bearer {api_key}\", \"Content-Type\": \"application/json\"}, timeout=30)\n\
          \                r.raise_for_status()\n                content = r.json()[\"\
          choices\"][0][\"message\"][\"content\"]\n                clean = content.strip()\n\
          \                if clean.startswith(\"```\"):\n                    lines\
          \ = clean.split(\"\\n\")\n                    lines = [l for l in lines\
          \ if not l.strip().startswith(\"```\")]\n                    clean = \"\\\
          n\".join(lines)\n                parsed = json.loads(clean)\n          \
          \      for v in parsed.get(\"variants\", [])[:variants_per_seed]:\n    \
          \                q = v.get(\"question\", \"\")\n                    if q:\n\
          \                        all_variants.append({\n                       \
          \     \"inputs\": {\"question\": q},\n                            \"expectations\"\
          : {\n                                \"expected_keywords\": v.get(\"expected_keywords\"\
          , []),\n                                \"question_type\": v.get(\"question_type\"\
          , seed[\"question_type\"]),\n                            },\n          \
          \              })\n            except Exception as ex:\n               \
