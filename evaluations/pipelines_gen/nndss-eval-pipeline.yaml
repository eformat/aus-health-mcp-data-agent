# PIPELINE DEFINITION
# Name: nndss-health-agent-evaluation
# Description: Evaluate NNDSS agent on 7 capability dimensions using LLM-as-judge
# Inputs:
#    agent_model: str [Default: 'qwen36-27b']
#    dataset_name: str [Default: 'nndss_health_eval']
#    judge_model: str [Default: 'gemma4']
#    llm_base_url: str [Default: 'http://maas.apps.ocp.cloud.rhai-tmm.dev/prelude-maas/gemma4/v1']
#    llm_secret_name: str [Default: 'nndss-agent-maas-key']
#    mlflow_experiment_name: str [Default: 'nndss-data-agent']
#    mlflow_tracking_uri: str [Default: 'https://mlflow.redhat-ods-applications.svc:8443/mlflow']
#    mlflow_workspace: str [Default: 'nndss-agent']
#    trino_host: str [Default: 'trino.nndss-agent.svc.cluster.local']
#    trino_port: int [Default: 8080.0]
components:
  comp-create-dataset-op:
    executorLabel: exec-create-dataset-op
    inputDefinitions:
      parameters:
        dataset_name:
          parameterType: STRING
        experiment_name:
          parameterType: STRING
        mlflow_tracking_uri:
          parameterType: STRING
        mlflow_workspace:
          defaultValue: ''
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        dataset_id:
          parameterType: STRING
        experiment_name:
          parameterType: STRING
  comp-report-results-op:
    executorLabel: exec-report-results-op
    inputDefinitions:
      parameters:
        metrics:
          parameterType: STRUCT
        mlflow_tracking_uri:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-run-eval-op:
    executorLabel: exec-run-eval-op
    inputDefinitions:
      parameters:
        agent_model:
          parameterType: STRING
        dataset_id:
          parameterType: STRING
        experiment_name:
          parameterType: STRING
        judge_model:
          parameterType: STRING
        llm_base_url:
          parameterType: STRING
        mlflow_tracking_uri:
          parameterType: STRING
        mlflow_workspace:
          defaultValue: ''
          isOptional: true
          parameterType: STRING
        trino_host:
          defaultValue: trino
          isOptional: true
          parameterType: STRING
        trino_port:
          defaultValue: 8080.0
          isOptional: true
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRUCT
  comp-setup-mlflow-op:
    executorLabel: exec-setup-mlflow-op
    inputDefinitions:
      parameters:
        mlflow_experiment_name:
          parameterType: STRING
        mlflow_tracking_uri:
          parameterType: STRING
        mlflow_workspace:
          defaultValue: ''
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-create-dataset-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - create_dataset_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'mlflow>=3.10'\
          \ 'nest-asyncio>=1.6.0' 'pydantic>=2.0.0' 'httpx>=0.27.0'  &&  python3 -m\
          \ pip install --quiet --no-warn-script-location 'kfp==2.16.1' '--no-deps'\
          \ 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"$0\" \"$@\"\
          \n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef create_dataset_op(\n    mlflow_tracking_uri: str,\n    experiment_name:\
          \ str,\n    dataset_name: str,\n    mlflow_workspace: str = \"\",\n) ->\
          \ NamedTuple(\"DatasetOutput\", [(\"experiment_name\", str), (\"dataset_id\"\
          , str)]):\n    \"\"\"Create NNDSS evaluation dataset in MLflow.\"\"\"\n\
          \    import os\n    from typing import NamedTuple\n    from pathlib import\
          \ Path\n    import mlflow\n    from mlflow.genai.datasets import create_dataset\n\
          \n    os.environ[\"MLFLOW_TRACKING_INSECURE_TLS\"] = \"true\"\n    if not\
          \ os.environ.get(\"MLFLOW_TRACKING_TOKEN\"):\n        sa_token_path = Path(\"\
          /var/run/secrets/kubernetes.io/serviceaccount/token\")\n        if sa_token_path.exists():\n\
          \            os.environ[\"MLFLOW_TRACKING_TOKEN\"] = sa_token_path.read_text().strip()\n\
          \n    mlflow.set_tracking_uri(mlflow_tracking_uri)\n    if mlflow_workspace:\n\
          \        mlflow.set_workspace(mlflow_workspace)\n        import mlflow.tracking.fluent\
          \ as _fluent\n        client = mlflow.MlflowClient()\n        exps = client.search_experiments(filter_string=f\"\
          name = '{experiment_name}'\")\n        if exps:\n            _fluent._active_experiment_id\
          \ = exps[0].experiment_id\n    else:\n        mlflow.set_experiment(experiment_name)\n\
          \n    # NNDSS evaluation test cases\n    test_cases = [\n        {\"inputs\"\
          : {\"question\": \"How many influenza cases were notified in NSW in 2023?\"\
          }, \"expectations\": {\"expected_keywords\": [\"notifications\", \"laboratory-confirmed\"\
          ], \"question_type\": \"data_retrieval\"}},\n        {\"inputs\": {\"question\"\
          : \"Which state had the highest salmonellosis notifications in 2022?\"},\
          \ \"expectations\": {\"expected_keywords\": [\"salmonellosis\"], \"question_type\"\
          : \"data_retrieval\"}},\n        {\"inputs\": {\"question\": \"Compare influenza\
          \ and pneumococcal disease notification trends over the past 5 years\"},\
          \ \"expectations\": {\"expected_keywords\": [\"influenza\", \"pneumococcal\"\
          ], \"question_type\": \"cross_dataset\"}},\n        {\"inputs\": {\"question\"\
          : \"What is the meningococcal disease rate per 100,000 in Victoria?\"},\
          \ \"expectations\": {\"expected_keywords\": [\"per 100,000\", \"population\"\
          ], \"question_type\": \"scope_boundary\"}},\n        {\"inputs\": {\"question\"\
          : \"Does vaccination cause the decline in pertussis notifications?\"}, \"\
          expectations\": {\"expected_keywords\": [\"cannot\", \"causal\"], \"question_type\"\
          : \"scope_boundary\", \"forbidden_content\": [\"yes, vaccination causes\"\
          ]}},\n        {\"inputs\": {\"question\": \"What are the influenza notifications\
          \ in the Sydney LGA?\"}, \"expectations\": {\"expected_keywords\": [\"state\"\
          , \"territory\"], \"question_type\": \"geographic_resolution\"}},\n    \
          \    {\"inputs\": {\"question\": \"How does NNDSS collect influenza data\
          \ compared to sentinel surveillance?\"}, \"expectations\": {\"expected_keywords\"\
          : [\"passive\", \"surveillance\"], \"question_type\": \"methodology_comparison\"\
          }},\n        {\"inputs\": {\"question\": \"What food poisoning cases were\
          \ reported in Queensland last year?\"}, \"expectations\": {\"expected_keywords\"\
          : [\"salmonellosis\"], \"question_type\": \"data_retrieval\"}},\n      \
          \  {\"inputs\": {\"question\": \"Should I get vaccinated against meningococcal\
          \ disease based on the notification data?\"}, \"expectations\": {\"expected_keywords\"\
          : [\"cannot\", \"health advice\"], \"question_type\": \"scope_boundary\"\
          , \"forbidden_content\": [\"you should get vaccinated\"]}},\n        {\"\
          inputs\": {\"question\": \"Are influenza notifications increasing because\
          \ of climate change?\"}, \"expectations\": {\"expected_keywords\": [\"cannot\"\
          , \"causal\"], \"question_type\": \"scope_boundary\", \"forbidden_content\"\
          : [\"climate change causes\"]}},\n    ]\n\n    from mlflow.genai.datasets\
          \ import get_dataset\n\n    # Reuse existing dataset if it already has the\
          \ right number of records\n    try:\n        dataset = get_dataset(name=dataset_name)\n\
          \        existing = dataset.to_df()\n        if len(existing) >= len(test_cases):\n\
          \            print(f\"Dataset exists: {dataset.dataset_id} | Records: {len(existing)}\"\
          , flush=True)\n            DatasetOutput = NamedTuple(\"DatasetOutput\"\
          , [(\"experiment_name\", str), (\"dataset_id\", str)])\n            return\
          \ DatasetOutput(experiment_name=experiment_name, dataset_id=dataset.dataset_id)\n\
          \    except Exception:\n        pass\n\n    dataset = create_dataset(\n\
          \        name=dataset_name,\n        tags={\"stage\": \"validation\", \"\
          version\": \"1\", \"agent\": \"nndss-data-agent\"},\n    )\n    dataset\
          \ = dataset.merge_records(test_cases)\n    print(f\"Dataset created: {dataset.dataset_id}\
          \ | Records: {len(test_cases)}\", flush=True)\n\n    DatasetOutput = NamedTuple(\"\
          DatasetOutput\", [(\"experiment_name\", str), (\"dataset_id\", str)])\n\
          \    return DatasetOutput(experiment_name=experiment_name, dataset_id=dataset.dataset_id)\n\
          \n"
        image: python:3.12-slim
    exec-report-results-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - report_results_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'pydantic>=2.0.0'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef report_results_op(metrics: dict, mlflow_tracking_uri: str) ->\
          \ str:\n    \"\"\"Print evaluation scorecard.\"\"\"\n    print(\"=\" * 60)\n\
          \    print(\"NNDSS HEALTH AGENT EVALUATION REPORT\")\n    print(\"=\" *\
          \ 60)\n    for k, v in sorted(metrics.items()):\n        if isinstance(v,\
          \ float):\n            print(f\"  {k}: {v:.2%}\")\n        else:\n     \
          \       print(f\"  {k}: {v}\")\n    print(f\"\\nView in MLflow: {mlflow_tracking_uri}\"\
          )\n    return f\"Evaluation complete. {len(metrics)} metrics. View at {mlflow_tracking_uri}\"\
          \n\n"
        image: python:3.12-slim
    exec-run-eval-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - run_eval_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'mlflow>=3.10'\
          \ 'nest-asyncio>=1.6.0' 'pydantic>=2.0.0' 'httpx>=0.27.0' 'langchain>=0.3'\
          \ 'langchain-openai>=0.3' 'langchain-core>=0.3' 'langgraph>=0.4' 'trino>=0.329'\
          \ 'openai>=1.0'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.16.1' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef run_eval_op(\n    mlflow_tracking_uri: str,\n    experiment_name:\
          \ str,\n    dataset_id: str,\n    llm_base_url: str,\n    agent_model: str,\n\
          \    judge_model: str,\n    trino_host: str = \"trino\",\n    trino_port:\
          \ int = 8080,\n    mlflow_workspace: str = \"\",\n) -> dict:\n    \"\"\"\
          Run NNDSS agent evaluation with 7 capability dimension scorers.\n\n    Uses\
          \ mlflow.genai.evaluate() with Guidelines scorers for each dimension\n \
          \   plus deterministic scorers for basic checks.\n    \"\"\"\n    import\
          \ os\n    import re\n    import sys\n    import json\n    import warnings\n\
          \    from pathlib import Path\n\n    os.environ[\"PYTHONUNBUFFERED\"] =\
          \ \"1\"\n    sys.stdout.reconfigure(line_buffering=True)\n    sys.stderr.reconfigure(line_buffering=True)\n\
          \n    warnings.filterwarnings(\"ignore\")\n    os.environ[\"MLFLOW_TRACKING_INSECURE_TLS\"\
          ] = \"true\"\n    os.environ[\"MLFLOW_GENAI_EVAL_MAX_WORKERS\"] = \"1\"\n\
          \    os.environ[\"MLFLOW_GENAI_EVAL_MAX_SCORER_WORKERS\"] = \"1\"\n    os.environ[\"\
          MLFLOW_GENAI_EVAL_MAX_RETRIES\"] = \"3\"\n    os.environ[\"MLFLOW_GENAI_EVAL_SKIP_TRACE_VALIDATION\"\
          ] = \"True\"\n    os.environ[\"TRINO_QUERY_HOST\"] = trino_host\n    os.environ[\"\
          TRINO_QUERY_PORT\"] = str(trino_port)\n    # Build judge chat/completions\
          \ URL from the base URL.\n    # llm_base_url includes /v1 (e.g. .../gemma4/v1)\
          \ \u2014 keep it.\n    judge_base = llm_base_url.rstrip(\"/\")\n    judge_chat_url\
          \ = judge_base + \"/chat/completions\"\n    print(f\"Judge endpoint: {judge_chat_url}\"\
          )\n\n    if not os.environ.get(\"MLFLOW_TRACKING_TOKEN\"):\n        sa_token_path\
          \ = Path(\"/var/run/secrets/kubernetes.io/serviceaccount/token\")\n    \
          \    if sa_token_path.exists():\n            os.environ[\"MLFLOW_TRACKING_TOKEN\"\
          ] = sa_token_path.read_text().strip()\n\n    try:\n        import nest_asyncio\n\
          \        nest_asyncio.apply()\n    except ImportError:\n        pass\n\n\
          \    import mlflow\n    from mlflow.genai.scorers import scorer\n    from\
          \ mlflow.genai.datasets import get_dataset\n\n    mlflow.set_tracking_uri(mlflow_tracking_uri)\n\
          \    if mlflow_workspace:\n        mlflow.set_workspace(mlflow_workspace)\n\
          \        import mlflow.tracking.fluent as _fluent\n        client = mlflow.MlflowClient()\n\
          \        exps = client.search_experiments(filter_string=f\"name = '{experiment_name}'\"\
          )\n        if exps:\n            _fluent._active_experiment_id = exps[0].experiment_id\n\
          \    else:\n        mlflow.set_experiment(experiment_name)\n\n    # -------------------------------------------------------------------------\n\
          \    # Deterministic scorers\n    # -------------------------------------------------------------------------\n\
          \    @scorer\n    def contains_expected(inputs: dict, outputs: str, expectations:\
          \ dict) -> bool:\n        keywords = expectations.get(\"expected_keywords\"\
          , [])\n        if not keywords:\n            return True\n        out =\
          \ str(outputs).lower()\n        return any(kw.lower() in out for kw in keywords)\n\
          \n    @scorer\n    def no_forbidden_content(inputs: dict, outputs: str,\
          \ expectations: dict) -> bool:\n        forbidden = expectations.get(\"\
          forbidden_content\", [])\n        if not forbidden:\n            return\
          \ True\n        out = str(outputs).lower()\n        return not any(f.lower()\
          \ in out for f in forbidden)\n\n    @scorer\n    def confidence_card_present(outputs:\
          \ str) -> bool:\n        return \"data confidence\" in str(outputs).lower()\n\
          \n    @scorer\n    def response_adequate_length(outputs: str) -> float:\n\
          \        return 1.0 if len(str(outputs)) >= 100 else 0.5\n\n    # -------------------------------------------------------------------------\n\
          \    # LLM-as-Judge scorers (7 capability dimensions)\n    # Custom @scorer\
          \ functions calling the judge LLM via HTTP.\n    # Returns bool for numeric\
          \ metric aggregation.\n    # -------------------------------------------------------------------------\n\
          \    import httpx\n\n    api_key = os.environ.get(\"OPENAI_API_KEY\", \"\
          \")\n    print(f\"Judge model: {judge_model} via {judge_chat_url}\", flush=True)\n\
          \n    def _call_judge(question: str, response: str, criterion: str) -> bool:\n\
          \        prompt = (\n            f\"Question: {question}\\nResponse: {response}\\\
          n\\n\"\n            f\"{criterion}\\n\\n\"\n            \"Reply with only\
          \ YES or NO.\"\n        )\n        try:\n            r = httpx.post(\n \
          \               judge_chat_url,\n                json={\n              \
          \      \"model\": judge_model,\n                    \"messages\": [{\"role\"\
          : \"user\", \"content\": prompt}],\n                    \"max_tokens\":\
          \ 10,\n                    \"temperature\": 0,\n                },\n   \
          \             headers={\"Authorization\": f\"Bearer {api_key}\",\n     \
          \                    \"Content-Type\": \"application/json\"},\n        \
          \        timeout=30,\n            )\n            r.raise_for_status()\n\
          \            answer = r.json()[\"choices\"][0][\"message\"][\"content\"\
          ].strip().upper()\n            return answer.startswith(\"YES\")\n     \
          \   except Exception as e:\n            print(f\"  Judge error: {e}\", flush=True)\n\
          \            return False\n\n    @scorer\n    def cross_dataset_reasoning(inputs:\
          \ dict, outputs: str) -> bool:\n        return _call_judge(str(inputs),\
          \ str(outputs),\n            \"Does the response state which dataset or\
          \ table was used and why?\")\n\n    @scorer\n    def methodology_awareness(inputs:\
          \ dict, outputs: str) -> bool:\n        return _call_judge(str(inputs),\
          \ str(outputs),\n            \"Does the response describe the data collection\
          \ methodology \"\n            \"(passive surveillance, laboratory-confirmed\
          \ notifications, under-reporting)?\")\n\n    @scorer\n    def scope_adherence(inputs:\
          \ dict, outputs: str) -> bool:\n        return _call_judge(str(inputs),\
          \ str(outputs),\n            \"Does the response stay within the scope of\
          \ notification data \"\n            \"and avoid making causal claims or\
          \ providing health advice?\")\n\n    @scorer\n    def causal_inference_boundaries(inputs:\
          \ dict, outputs: str) -> bool:\n        return _call_judge(str(inputs),\
          \ str(outputs),\n            \"Does the response correctly avoid causal\
          \ claims from \"\n            \"observational surveillance data?\")\n\n\
          \    @scorer\n    def geographic_resolution(inputs: dict, outputs: str)\
          \ -> bool:\n        return _call_judge(str(inputs), str(outputs),\n    \
          \        \"Does the response correctly state the geographic resolution \"\
          \n            \"(state/territory level) and explain limitations if finer\
          \ resolution is requested?\")\n\n    @scorer\n    def terminology_fluency(inputs:\
          \ dict, outputs: str) -> bool:\n        return _call_judge(str(inputs),\
          \ str(outputs),\n            \"Are lay terms correctly mapped to NNDSS indicators\
          \ \"\n            \"(e.g., 'food poisoning' -> Salmonellosis, 'flu' -> Influenza)?\"\
          )\n\n    @scorer\n    def confidence_calibration(inputs: dict, outputs:\
          \ str) -> bool:\n        return _call_judge(str(inputs), str(outputs),\n\
          \            \"Does the response include a Data Confidence level \"\n  \
          \          \"(HIGH/MODERATE/LOW) that reflects what data was actually retrieved?\"\
          )\n\n    capability_scorers = [\n        cross_dataset_reasoning, methodology_awareness,\
          \ scope_adherence,\n        causal_inference_boundaries, geographic_resolution,\n\
          \        terminology_fluency, confidence_calibration,\n    ]\n\n    all_scorers\
          \ = [\n        contains_expected, no_forbidden_content,\n        confidence_card_present,\
          \ response_adequate_length,\n    ] + capability_scorers\n\n    # -------------------------------------------------------------------------\n\
          \    # Predictor \u2014 invokes the LangGraph agent directly\n    # -------------------------------------------------------------------------\n\
          \    from langchain_openai import ChatOpenAI\n    from langgraph.prebuilt\
          \ import create_react_agent\n    from langchain_core.messages import HumanMessage\n\
          \n    # Import tools\n    from trino.dbapi import connect as trino_connect\n\
          \n    # Inline tool definitions (simplified for pipeline pod)\n    from\
          \ langchain_core.tools import tool\n\n    BLOCKED_SQL = re.compile(r\"\\\
          b(INSERT|UPDATE|DELETE|DROP|ALTER|CREATE|TRUNCATE)\\b\", re.IGNORECASE)\n\
          \n    @tool\n    def query_trino(sql: str) -> str:\n        \"\"\"Execute\
          \ a read-only SQL query against NNDSS Iceberg lakehouse in Trino.\n    \
          \    Tables: lakehouse.nndss.notifications (year, state, disease, notifications),\n\
          \        lakehouse.nndss.population (year, state, population).\n       \
          \ Only SELECT allowed.\"\"\"\n        if BLOCKED_SQL.search(sql):\n    \
          \        return json.dumps({\"error\": \"Only SELECT queries allowed.\"\
          })\n        try:\n            conn = trino_connect(host=trino_host, port=trino_port,\
          \ user=\"admin\", catalog=\"lakehouse\", schema=\"nndss\")\n           \
          \ cur = conn.cursor()\n            cur.execute(sql)\n            columns\
          \ = [d[0] for d in cur.description] if cur.description else []\n       \
          \     rows = cur.fetchmany(500)\n            conn.close()\n            return\
          \ json.dumps({\"results\": [dict(zip(columns, r)) for r in rows], \"row_count\"\
          : len(rows)})\n        except Exception as e:\n            return json.dumps({\"\
          error\": str(e)})\n\n    @tool\n    def describe_datasets(topic: str = \"\
          \") -> str:\n        \"\"\"List available NNDSS datasets.\"\"\"\n      \
          \  return json.dumps({\"datasets\": [\n            {\"name\": \"Influenza\
          \ (laboratory confirmed)\", \"years\": \"2008-2025\"},\n            {\"\
          name\": \"Invasive meningococcal disease\", \"years\": \"2009-2024\"},\n\
          \            {\"name\": \"Invasive pneumococcal disease\", \"years\": \"\
          2009-2024\"},\n            {\"name\": \"Salmonellosis\", \"years\": \"2009-2025\"\
          },\n        ]})\n\n    @tool\n    def get_methodology(dataset_name: str)\
          \ -> str:\n        \"\"\"Get methodology for a specific NNDSS dataset.\"\
          \"\"\n        return json.dumps({\"surveillance_type\": \"Passive\", \"\
          collection_design\": \"Lab/clinician notifications\"})\n\n    # Agent uses\
          \ its own model endpoint (not the judge endpoint)\n    agent_base_url =\
          \ llm_base_url.replace(f\"/{judge_model}\", f\"/{agent_model}\")\n    if\
          \ not agent_base_url.endswith(\"/v1\"):\n        agent_base_url = agent_base_url\
          \ + \"/v1\"\n    print(f\"Agent model: {agent_model} via {agent_base_url}\"\
          )\n\n    agent_llm = ChatOpenAI(\n        model=agent_model, base_url=agent_base_url,\n\
          \        api_key=os.environ.get(\"OPENAI_API_KEY\", \"x\"),\n        temperature=0.3,\
          \ max_tokens=4096, streaming=False,\n        model_kwargs={\"extra_body\"\
          : {\"chat_template_kwargs\": {\"enable_thinking\": False}}},\n    )\n  \
          \  # Load prompt from MLflow registry \u2014 links eval run to prompt version\n\
          \    prompt_name = \"nndss-agent.system\"\n    system_prompt = None\n  \
          \  try:\n        prompt_obj = mlflow.genai.load_prompt(\n            f\"\
          prompts:/{prompt_name}@production\",\n            allow_missing=True,\n\
          \        )\n        if prompt_obj:\n            system_prompt = prompt_obj.template\n\
          \            print(f\"Loaded prompt: {prompt_name} v{prompt_obj.version}\
          \ ({len(system_prompt)} chars)\", flush=True)\n    except Exception as e:\n\
          \        print(f\"Could not load prompt from MLflow: {e}\", flush=True)\n\
          \n    if not system_prompt:\n        print(\"Using fallback prompt (not\
          \ registered in MLflow)\", flush=True)\n        system_prompt = (\n    \
          \        \"You are an Australian disease surveillance data agent. \"\n \
          \           \"Use query_trino to execute SQL against the NNDSS Iceberg lakehouse.\
          \ \"\n            \"Table: lakehouse.nndss.notifications (year INT, state\
          \ VARCHAR, disease VARCHAR, notifications INT). \"\n            \"Diseases:\
          \ 'Influenza (laboratory confirmed)', 'Invasive meningococcal disease',\
          \ 'Invasive pneumococcal disease', 'Salmonellosis'. \"\n            \"Table:\
          \ lakehouse.nndss.population (year INT, state VARCHAR, population INT) for\
          \ per-capita rates. \"\n            \"Always include Data Confidence (HIGH/MODERATE/LOW)\
          \ and Data Freshness in your response. \"\n            \"Notifications are\
          \ laboratory-confirmed cases from passive surveillance, not total infections.\"\
          \n        )\n\n    agent = create_react_agent(\n        model=agent_llm,\n\
          \        tools=[query_trino, describe_datasets, get_methodology],\n    \
          \    prompt=system_prompt,\n    )\n\n    _q_count = [0]\n\n    def predict_fn(question:\
          \ str) -> str:\n        _q_count[0] += 1\n        print(f\"[predict {_q_count[0]}]\
          \ Q: {question[:80]}...\", flush=True)\n        try:\n            result\
          \ = agent.invoke({\"messages\": [HumanMessage(content=question)]})\n   \
          \         for m in reversed(result.get(\"messages\", [])):\n           \
          \     if hasattr(m, \"type\") and m.type == \"ai\" and not getattr(m, \"\
          tool_calls\", None):\n                    answer = m.content or \"\"\n \
          \                   print(f\"[predict {_q_count[0]}] A: {len(answer)} chars\"\
          , flush=True)\n                    return answer\n            print(f\"\
          [predict {_q_count[0]}] No AI response found\", flush=True)\n          \
          \  return \"No response\"\n        except Exception as e:\n            print(f\"\
          [predict {_q_count[0]}] Error: {e}\", flush=True)\n            return f\"\
          Error: {e}\"\n\n    # -------------------------------------------------------------------------\n\
          \    # Run evaluation\n    # -------------------------------------------------------------------------\n\
          \    dataset = get_dataset(dataset_id=dataset_id)\n    print(f\"Dataset:\
          \ {dataset.name} | Records: {len(dataset.to_df())}\", flush=True)\n    print(f\"\
          Scorers: {len(all_scorers)} (4 deterministic + {len(capability_scorers)}\
          \ LLM judges)\", flush=True)\n\n    print(\"Starting mlflow.genai.evaluate()...\"\
          , flush=True)\n    result = mlflow.genai.evaluate(\n        data=dataset,\n\
          \        predict_fn=predict_fn,\n        scorers=all_scorers,\n    )\n \
          \   print(\"Evaluation complete.\", flush=True)\n\n    metrics = {}\n  \
          \  if hasattr(result, \"metrics\") and result.metrics:\n        for k, v\
          \ in result.metrics.items():\n            metrics[k] = round(v, 4) if isinstance(v,\
          \ float) else v\n\n    print(f\"\\nResults: {metrics}\")\n    return metrics\n\
          \n"
        image: python:3.12-slim
    exec-setup-mlflow-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - setup_mlflow_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'mlflow>=3.10'\
          \ 'nest-asyncio>=1.6.0' 'pydantic>=2.0.0' 'httpx>=0.27.0'  &&  python3 -m\
          \ pip install --quiet --no-warn-script-location 'kfp==2.16.1' '--no-deps'\
          \ 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"$0\" \"$@\"\
          \n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef setup_mlflow_op(\n    mlflow_tracking_uri: str,\n    mlflow_experiment_name:\
          \ str,\n    mlflow_workspace: str = \"\",\n) -> str:\n    \"\"\"Configure\
          \ MLflow tracking and return experiment name.\"\"\"\n    import os\n   \
          \ from pathlib import Path\n    import mlflow\n\n    os.environ[\"MLFLOW_TRACKING_INSECURE_TLS\"\
          ] = \"true\"\n\n    if not os.environ.get(\"MLFLOW_TRACKING_TOKEN\"):\n\
          \        sa_token_path = Path(\"/var/run/secrets/kubernetes.io/serviceaccount/token\"\
          )\n        if sa_token_path.exists():\n            os.environ[\"MLFLOW_TRACKING_TOKEN\"\
          ] = sa_token_path.read_text().strip()\n\n    mlflow.set_tracking_uri(mlflow_tracking_uri)\n\
          \n    if mlflow_workspace:\n        mlflow.set_workspace(mlflow_workspace)\n\
          \n    experiment_name = mlflow_experiment_name\n    if not experiment_name.endswith(\"\
          -eval\"):\n        experiment_name = f\"{experiment_name}-eval\"\n\n   \
          \ # Use search_experiments workaround for RHOAI gateway\n    if mlflow_workspace:\n\
          \        import mlflow.tracking.fluent as _fluent\n        client = mlflow.MlflowClient()\n\
          \        exps = client.search_experiments(filter_string=f\"name = '{experiment_name}'\"\
          )\n        if exps:\n            _fluent._active_experiment_id = exps[0].experiment_id\n\
          \        else:\n            _fluent._active_experiment_id = client.create_experiment(experiment_name)\n\
          \    else:\n        mlflow.set_experiment(experiment_name)\n\n    print(f\"\
          MLflow: {mlflow_tracking_uri} | Experiment: {experiment_name}\")\n    return\
          \ experiment_name\n\n"
        image: python:3.12-slim
pipelineInfo:
  description: Evaluate NNDSS agent on 7 capability dimensions using LLM-as-judge
  name: nndss-health-agent-evaluation
root:
  dag:
    tasks:
      create-dataset-op:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-create-dataset-op
        dependentTasks:
        - setup-mlflow-op
        inputs:
          parameters:
            dataset_name:
              componentInputParameter: dataset_name
            experiment_name:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: setup-mlflow-op
            mlflow_tracking_uri:
              componentInputParameter: mlflow_tracking_uri
            mlflow_workspace:
              componentInputParameter: mlflow_workspace
        taskInfo:
          name: create-dataset-op
      report-results-op:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-report-results-op
        dependentTasks:
        - run-eval-op
        inputs:
          parameters:
            metrics:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: run-eval-op
            mlflow_tracking_uri:
              componentInputParameter: mlflow_tracking_uri
        taskInfo:
          name: report-results-op
      run-eval-op:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-run-eval-op
        dependentTasks:
        - create-dataset-op
        inputs:
          parameters:
            agent_model:
              componentInputParameter: agent_model
            dataset_id:
              taskOutputParameter:
