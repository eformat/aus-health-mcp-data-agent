# Gold standard: geographic resolution boundary question.
#
# Tests whether the agent correctly identifies that LGA-level data
# is not available in NNDSS public datasets and explains why, while
# offering constructive alternatives.

id: q06
question: "What are the influenza notifications in the Sydney LGA?"
source: manual-seed

evaluation_criteria:
  - "Geographic resolution knowledge: NNDSS is state/territory only"
  - "Honest limitation disclosure with explanation of why"
  - "Constructive redirection to alternatives"
  - "Scope adherence: does not fabricate sub-state data"

relevant_capabilities:
  cross_dataset_reasoning:
    applies: true
    expected: >
      Identifies NNDSS Influenza as the dataset the user likely wants,
      but notes that it cannot provide LGA-level data. Suggests
      alternatives: NSW state-level data from NNDSS (coarser but
      available), NSW Health Influenza Surveillance Reports (may have
      regional breakdowns), PHIDU Social Health Atlas (modelled health
      indicators at LGA level from different data sources).
  methodology_awareness:
    applies: true
    expected: >
      Explains why NNDSS public data is state/territory level only.
      Individual notification records do contain finer geographic
      information (postcode of residence) but this is not released
      publicly to protect patient privacy and prevent identification
      of individuals, especially for rarer diseases.
  scope_adherence:
    applies: true
    expected: >
      Does not attempt to provide LGA-level data. Does not estimate
      or apportion state-level data to LGA level. Clearly states the
      limitation and offers what CAN be provided (NSW state-level data).
  causal_inference_boundaries:
    applies: false
    expected: ""
  geographic_resolution_knowledge:
    applies: true
    expected: >
      This is the primary dimension being tested. The agent must clearly
      state that NNDSS public datasets provide state/territory level
      data only. It should explain WHY: privacy protection for
      individual notifications, especially for rarer diseases. It should
      explain what geographic levels ARE available (state/territory and
      national). It should offer alternatives for finer resolution.
  terminology_fluency:
    applies: true
    expected: >
      Maps "influenza" to "Influenza (laboratory confirmed)" in the
      NNDSS. Correctly interprets "Sydney LGA" as a request for
      sub-state geographic resolution. Notes that "Sydney" could refer
      to the City of Sydney LGA or the broader Greater Sydney region,
      but neither is available in NNDSS public data.

gold_standard_reasoning:
  - step: 1
    consideration: "query_interpretation"
    thought: >
      The user wants influenza notification data for the Sydney Local
      Government Area. This is a sub-state geographic request. NNDSS
      public datasets do not provide data at this resolution.
  - step: 2
    consideration: "geographic_resolution_check"
    thought: >
      NNDSS public datasets aggregate to state/territory level only.
      The underlying notification records contain postcode of residence,
      but this is not publicly released. LGA-level breakdowns are not
      available. The agent cannot answer this question as asked.
  - step: 3
    consideration: "why_not_available"
    thought: >
      The limitation exists for privacy protection. Individual
      notifications with fine geographic detail could potentially
      identify individuals, especially for rare diseases. The public
      datasets balance transparency with privacy by aggregating to
      state/territory level.
  - step: 4
    consideration: "alternatives"
    thought: >
      The agent should offer constructive alternatives:
      1. NSW state-level influenza data (available, coarser than requested)
      2. NSW Health Influenza Surveillance Reports (may have regional
         breakdowns for specific seasons)
      3. PHIDU Social Health Atlas (modelled health indicators at LGA
         level, but different data sources and methods)
      4. NNDSS fortnightly reports (occasionally have regional breakdowns
         during significant outbreaks)
  - step: 5
    consideration: "response_construction"
    thought: >
      Clearly state the limitation, explain why, offer the NSW state-level
      data as the closest available alternative, and list other options.
      Do not attempt to provide or estimate LGA-level data.

gold_standard_answer: |
  NNDSS public datasets do not provide influenza notification data at the
  Local Government Area (LGA) level. The finest geographic resolution
  available is state/territory.

  **Why LGA data is not publicly available**: Individual notification
  records do contain the patient's postcode of residence, but this
  information is not released in public datasets to protect patient
  privacy. Aggregation to state/territory level prevents identification
  of individuals, which is particularly important for rarer diseases.

  **What I can provide**: I can retrieve influenza notification data for
  the whole of New South Wales (NSW), which includes the Sydney LGA.
  Would you like me to retrieve NSW influenza notifications?

  **Alternative sources for finer geographic resolution**:
  - **NSW Health Influenza Surveillance Reports**: May contain regional
    breakdowns (e.g., Local Health District) for specific influenza
    seasons
  - **PHIDU Social Health Atlas**: Provides modelled health indicators
    at LGA level, but uses different data sources and methods (not
    directly comparable to NNDSS notifications)
  - **NNDSS fortnightly reports**: Occasionally provide sub-state
    breakdowns during significant outbreaks, but this is not routine

bad_answer_examples:
  - description: "Estimates Sydney LGA notifications by apportioning NSW counts by population share"
    why_bad: >
      Fabricates sub-state data. Disease notifications do not distribute
      proportionally to population -- they depend on local demographics,
      testing access, outbreak clusters, and healthcare-seeking behaviour.
      Apportioning state counts to LGA level produces a meaningless
      number that appears authoritative.
  - description: "Simply states 'data not available' without explaining why or offering alternatives"
    why_bad: >
      While honest, this is unhelpful. The agent should explain why the
      limitation exists (privacy) and what alternatives the user has for
      getting closer to the information they need.
  - description: "Provides NSW state-level data and presents it as representative of Sydney"
    why_bad: >
      NSW includes vast rural and regional areas with different disease
      epidemiology than metropolitan Sydney. Presenting state-level data
      as representative of a specific LGA is geographically misleading.

question_type: "geographic_resolution"
can_server_answer: "no"
