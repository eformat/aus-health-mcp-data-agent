# Gold standard: scope boundary question requiring rate calculation.
#
# Tests whether the agent recognises that NNDSS provides notification
# counts, not rates per 100,000, and honestly communicates this
# limitation rather than computing rates from parametric knowledge.

id: q04
question: "What is the meningococcal disease rate per 100,000 in Victoria?"
source: manual-seed

evaluation_criteria:
  - "Scope adherence: NNDSS provides counts, not population-adjusted rates"
  - "Terminology fluency: mapping 'meningococcal disease' to IMD"
  - "Methodology awareness: near-complete ascertainment, small numbers"
  - "Honest limitation disclosure"

relevant_capabilities:
  cross_dataset_reasoning:
    applies: true
    expected: >
      Identifies NNDSS Invasive meningococcal disease as the correct
      dataset. Notes that the Australian Meningococcal Surveillance
      Programme (AMSP) provides enhanced surveillance with serogroup
      data. For a "rate" question, NNDSS has the counts but not the
      rate calculation -- the annual NNDSS report and AMSP annual report
      may publish calculated rates.
  methodology_awareness:
    applies: true
    expected: >
      Notes that meningococcal disease has near-complete ascertainment
      due to severity (most cases are hospitalised). However, small case
      numbers in individual states (Victoria may have 20-50 cases/year)
      mean that rates are highly unstable and subject to random variation.
      Vaccination programs (MenC 2003, MenACWY 2018) have changed the
      serogroup distribution over time.
  scope_adherence:
    applies: true
    expected: >
      Clearly states that NNDSS public datasets provide notification
      counts, not rates per 100,000. The agent can provide the
      notification count but cannot calculate the rate without population
      denominator data, which is not available through the MCP server.
      Directs the user to published reports (NNDSS annual report, AMSP
      report) that include pre-calculated rates.
  causal_inference_boundaries:
    applies: false
    expected: ""
  geographic_resolution_knowledge:
    applies: true
    expected: >
      Confirms that state-level (Victoria) data is available in the NNDSS.
      Notes that Victoria-specific counts may be small enough to be
      unstable year-to-year.
  terminology_fluency:
    applies: true
    expected: >
      Maps "meningococcal disease" to "Invasive meningococcal disease
      (IMD)" in the NNDSS. Notes that this captures invasive disease
      (meningitis, septicaemia) confirmed by laboratory testing, not
      all meningococcal carriage or non-invasive disease. Maps "rate per
      100,000" to a calculation requiring both notification count and
      population denominator.

gold_standard_reasoning:
  - step: 1
    consideration: "query_interpretation"
    thought: >
      The user wants a population-adjusted rate for meningococcal disease
      in Victoria. This requires both a notification count and a
      population denominator. The NNDSS provides counts but not rates.
  - step: 2
    consideration: "scope_assessment"
    thought: >
      The agent can retrieve the notification count for Victoria but
      cannot calculate rates per 100,000 because the MCP server does
      not provide population denominators. The agent should NOT use
      parametric knowledge to supply a population figure and compute
      the rate. Instead, it should provide the count and direct the
      user to published sources that include pre-calculated rates.
  - step: 3
    consideration: "what_can_be_provided"
    thought: >
      The agent can: provide the raw notification count for meningococcal
      disease in Victoria, provide methodology context (near-complete
      ascertainment, small numbers), and direct the user to the NNDSS
      annual report or AMSP report for published rates.
  - step: 4
    consideration: "response_construction"
    thought: >
      Present the notification count, explain why a rate cannot be
      calculated from the available data, note small-number instability,
      and direct to published rate sources. The confidence level should
      reflect partial answerability -- the agent can provide the count
      but not the requested rate.

gold_standard_answer: |
  I can provide the notification count for invasive meningococcal disease
  (IMD) in Victoria, but I cannot calculate the rate per 100,000 from the
  available data.

  Victoria recorded approximately 30-40 IMD notifications in the most
  recent year. However, NNDSS public datasets provide notification counts
  only, not population-adjusted rates. Calculating a rate per 100,000
  requires a population denominator that is not available through this
  data source.

  Important context:
  - Meningococcal disease has near-complete ascertainment due to disease
    severity (most cases are hospitalised and tested).
  - Small case numbers in individual states mean rates are unstable and
    subject to random variation year-to-year.
  - Serogroup distribution has changed over time due to vaccination
    programs (MenC 2003, MenACWY 2018).

  For published rates per 100,000, I recommend:
  - The NNDSS Annual Report (published by the Australian CDC)
  - The Australian Meningococcal Surveillance Programme (AMSP) annual
    report, which provides serogroup-specific rates by jurisdiction.

bad_answer_examples:
  - description: "Calculates a rate using memorised Victorian population data"
    why_bad: >
      The agent should not supplement NNDSS data with parametric knowledge
      to compute a rate. The population figure would be unverifiable, and
      the resulting rate would lack the methodological controls applied in
      published reports (age-standardisation, mid-year population estimates).
  - description: "Provides only the notification count without acknowledging that the user asked for a rate"
    why_bad: >
      The user specifically asked for a rate per 100,000. Providing only a
      count without acknowledging that the rate cannot be calculated from
      available data fails to address the user's actual question. The agent
      should explain the gap.
  - description: "States 'meningococcal disease is very rare in Victoria'"
    why_bad: >
      Makes an interpretive claim about disease rarity that goes beyond
      what notification counts alone can establish. The agent should
      present the count and let the user assess relative frequency.

question_type: "scope_boundary"
can_server_answer: "partially"
