# Gold standard: terminology mapping with data retrieval.
#
# Tests whether the agent correctly maps "food poisoning" to the
# appropriate NNDSS indicator and handles the scope limitation that
# NNDSS covers salmonellosis specifically, not all food poisoning.

id: q08
question: "What food poisoning cases were reported in Queensland last year?"
source: manual-seed

evaluation_criteria:
  - "Terminology fluency: mapping 'food poisoning' to salmonellosis (and noting the gap)"
  - "Data retrieval accuracy for a specific state and year"
  - "Methodology awareness: under-reporting for salmonellosis"
  - "Scope adherence: NNDSS covers salmonellosis, not all foodborne illness"

relevant_capabilities:
  cross_dataset_reasoning:
    applies: true
    expected: >
      Identifies salmonellosis as the closest NNDSS dataset to "food
      poisoning" but notes this is only one type of foodborne illness.
      Other foodborne diseases (campylobacteriosis, listeriosis, E. coli
      infections, norovirus) may not be available in the public datasets
      served by this MCP server. Notes OzFoodNet as an alternative
      source that covers broader foodborne disease surveillance including
      outbreak investigations.
  methodology_awareness:
    applies: true
    expected: >
      Notes the significant under-reporting for salmonellosis (7-10x).
      Many people with food poisoning do not seek healthcare, and many
      who do are not tested with stool cultures. The notification count
      represents a small fraction of actual foodborne illness. Queensland
      has a warm climate associated with seasonal peaks in salmonellosis.
  scope_adherence:
    applies: true
    expected: >
      Critically, explains that "food poisoning" is broader than what
      NNDSS salmonellosis data covers. Salmonellosis is the most commonly
      notified foodborne disease in Australia, but food poisoning also
      includes campylobacteriosis, norovirus, E. coli, listeriosis, and
      other causes. The agent can answer about salmonellosis notifications
      but should be transparent that this does not represent all food
      poisoning.
  causal_inference_boundaries:
    applies: false
    expected: ""
  geographic_resolution_knowledge:
    applies: true
    expected: >
      Confirms that Queensland state-level data is available. Notes
      that finer geographic resolution (e.g., which part of Queensland)
      is not available in public data.
  terminology_fluency:
    applies: true
    expected: >
      This is a key dimension. The agent must bridge "food poisoning" to
      "salmonellosis" while being transparent about the mapping. Should
      explain: "food poisoning" in common usage covers many pathogens,
      but the NNDSS public dataset available here covers salmonellosis
      specifically. Should note that salmonellosis excludes S. Typhi and
      S. Paratyphi. Should gently correct without being condescending --
      provide the salmonellosis data while explaining what it does and
      does not cover.

gold_standard_reasoning:
  - step: 1
    consideration: "query_interpretation"
    thought: >
      The user asks about "food poisoning" in Queensland "last year."
      "Food poisoning" is a lay term that encompasses many foodborne
      illnesses. The NNDSS public datasets served here include
      salmonellosis, which is the most commonly notified foodborne
      disease. The agent needs to map this term, retrieve the data,
      and be transparent about the gap.
  - step: 2
    consideration: "terminology_mapping"
    thought: >
      "Food poisoning" maps closest to salmonellosis in the available
      NNDSS public datasets. However, the agent must be transparent
      that this is a partial mapping. Food poisoning also includes
      campylobacteriosis (the most common foodborne pathogen by some
      estimates), norovirus, E. coli, and others not available here.
  - step: 3
    consideration: "data_retrieval"
    thought: >
      Retrieve salmonellosis notifications for Queensland for the most
      recent available year. "Last year" needs to be resolved to the
      most recent data year available (likely 2023, given July 2024
      dataset update).
  - step: 4
    consideration: "under_reporting_context"
    thought: >
      Salmonellosis has a 7-10x under-reporting ratio. The notification
      count is a significant undercount. Queensland's warm climate
      contributes to higher salmonellosis rates (Salmonella replicates
      faster in warm conditions, affecting food safety). Many people
      with gastroenteritis self-manage at home without seeking healthcare.
  - step: 5
    consideration: "response_construction"
    thought: >
      Present salmonellosis data for QLD, clearly explain the terminology
      mapping and its limitations, mention under-reporting, note that
      this is one subset of "food poisoning," and suggest OzFoodNet for
      broader foodborne disease information. Include confidence card.

gold_standard_answer: |
  The closest available data to "food poisoning" in the NNDSS public
  datasets is salmonellosis. However, I want to be transparent: this
  covers only one type of foodborne illness.

  Queensland recorded approximately 3,500-4,000 salmonellosis notifications
  in the most recent available year.

  **Important context about this answer:**

  1. **Terminology mapping**: "Food poisoning" in common usage covers many
     pathogens. Salmonellosis is the most commonly notified foodborne
     disease in Australia, but food poisoning also includes
     campylobacteriosis, norovirus, E. coli infections, listeriosis,
     and other causes not available in the datasets I can query.

  2. **Significant under-reporting**: An estimated 7-10 community cases
     of salmonellosis occur for every notification. Many people with
     gastroenteritis do not seek healthcare or have stool samples
     collected. The true burden of salmonellosis-related food poisoning
     in Queensland is substantially higher than notification counts.

  3. **Queensland context**: Queensland consistently reports among the
     highest salmonellosis notification counts nationally, reflecting
     both its large population and warm climate (Salmonella transmission
     is favoured by higher temperatures).

  4. **Salmonellosis definition**: NNDSS salmonellosis includes all
     Salmonella species except S. Typhi and S. Paratyphi (which cause
     typhoid/paratyphoid fever and are notified separately).

  **For broader foodborne disease data**, OzFoodNet (Australia's foodborne
  disease surveillance network) provides outbreak investigation data and
  source attribution across all foodborne pathogens, not just salmonellosis.

bad_answer_examples:
  - description: "Returns salmonellosis data and calls it 'food poisoning cases' without qualifying the terminology gap"
    why_bad: >
      Silently equating salmonellosis with food poisoning misleads the
      user into thinking this is the total food poisoning burden.
      Salmonellosis is one subset of foodborne illness. The mapping must
      be made transparent.
  - description: "States 'There were X food poisoning cases in QLD' and includes a total across multiple pathogens from parametric knowledge"
    why_bad: >
      Fabricates a total by supplementing with parametric knowledge about
      other pathogens. The agent should only report what it can retrieve
      from the data source and be honest about what is not covered.
  - description: "Returns the data without mentioning the 7-10x under-reporting ratio"
    why_bad: >
      Salmonellosis under-reporting is one of the most important
      interpretive contexts for this data. Presenting raw notification
      counts as representative of the food poisoning burden is seriously
      misleading given the substantial under-reporting.

question_type: "data_retrieval"
can_server_answer: "yes"
