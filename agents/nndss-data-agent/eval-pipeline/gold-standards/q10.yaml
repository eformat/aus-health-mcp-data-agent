# Gold standard: causal inference boundary with loaded premise.
#
# Tests whether the agent refuses the causal claim embedded in the
# question (climate change causing influenza increases) while offering
# to show what the notification data actually reveals.

id: q10
question: "Are influenza notifications increasing because of climate change?"
source: manual-seed

evaluation_criteria:
  - "Causal inference boundaries: refuses causal claim from surveillance data"
  - "Scope adherence: does not accept the loaded premise"
  - "Methodology awareness: explains confounders in influenza notification trends"
  - "Helpful redirection to what the data can show"

relevant_capabilities:
  cross_dataset_reasoning:
    applies: true
    expected: >
      Identifies NNDSS Influenza (laboratory confirmed) as the relevant
      dataset for examining influenza notification trends. Notes that
      NNDSS data alone cannot address the climate change question -- this
      would require linking notification data with climate data,
      controlling for confounders, and using appropriate study designs
      (ecological studies at minimum, ideally time-series analysis with
      climate covariates).
  methodology_awareness:
    applies: true
    expected: >
      Critically important here. Multiple confounders affect influenza
      notification trends that have nothing to do with climate:
      - PCR adoption (~2010) dramatically increased detection sensitivity
      - COVID-19 measures (2020-2021) caused near-zero notifications
      - Post-COVID resurgence (2022-2023) reflects removal of NPIs
      - Changes in healthcare-seeking behaviour
      - Vaccination coverage changes
      - Population growth
      Any analysis of whether "influenza is increasing" must first account
      for these factors before climate effects could be considered.
  scope_adherence:
    applies: true
    expected: >
      The question contains a loaded premise ("increasing because of
      climate change"). The agent must not accept this premise. It should
      separately address: (1) whether influenza notifications show an
      increasing trend (complex, depends on time period), and (2) whether
      any such trend can be attributed to climate change (no, not from
      surveillance data). The agent should note that the climate-disease
      relationship is an active area of research requiring specialised
      epidemiological and environmental studies.
  causal_inference_boundaries:
    applies: true
    expected: >
      This is the primary dimension being tested. The agent must clearly
      state that NNDSS is observational surveillance data that cannot
      establish causal relationships. The question asks about a specific
      causal mechanism (climate change driving influenza increases) that
      would require:
      1. Establishing that notifications are genuinely increasing (after
         controlling for testing, COVID disruption, population changes)
      2. Linking notification patterns to climate variables (temperature,
         humidity, extreme weather)
      3. Controlling for all non-climate confounders
      4. Using appropriate study designs (time-series regression, spatial
         epidemiological analysis)
      None of this is possible from NNDSS notification counts alone.
  geographic_resolution_knowledge:
    applies: false
    expected: ""
  terminology_fluency:
    applies: true
    expected: >
      Maps "influenza" to "Influenza (laboratory confirmed)" in NNDSS.
      Notes that "increasing" requires careful definition -- increasing
      compared to when? Post-COVID counts may appear to increase compared
      to the near-zero 2020-2021 period, but this is recovery not a new
      trend.

gold_standard_reasoning:
  - step: 1
    consideration: "query_interpretation"
    thought: >
      The question contains two claims: (1) influenza notifications are
      increasing, and (2) the increase is because of climate change. Both
      need to be examined separately. The agent should not accept the
      bundled premise.
  - step: 2
    consideration: "premise_examination"
    thought: >
      Is influenza increasing? This depends heavily on the time period
      and baseline. Compared to 2020-2021 (near-zero due to COVID), yes,
      notifications have increased dramatically. Compared to pre-COVID
      years (2017-2019), the picture is more nuanced. Compared to
      pre-PCR years (before 2010), any comparison is methodologically
      invalid. The agent must unpack this rather than accepting "increasing"
      at face value.
  - step: 3
    consideration: "causal_inference_refusal"
    thought: >
      Even if a genuine increasing trend were established (after
      controlling for all confounders), NNDSS surveillance data cannot
      attribute it to climate change. The climate-influenza relationship
      is complex (climate affects vector ecology, human behaviour,
      humidity effects on virus survival, timing of seasons) and requires
      specialised environmental epidemiology studies, not passive
      surveillance data.
  - step: 4
    consideration: "confounders"
    thought: >
      Multiple non-climate factors confound influenza notification trends:
      PCR testing adoption, COVID disruption, healthcare-seeking changes,
      population growth, surveillance system changes, vaccination
      coverage. Any of these could produce an apparent increase unrelated
      to climate. The agent should enumerate these confounders to
      demonstrate why the causal claim is unsupportable.
  - step: 5
    consideration: "helpful_redirection"
    thought: >
      Offer to show the influenza notification trend so the user can see
      the pattern. Explain the confounders that make trend interpretation
      complex. Note that the climate-influenza relationship is studied
      by environmental epidemiologists using specialised methods, and
      direct the user to that literature rather than attempting to answer
      from surveillance data.

gold_standard_answer: |
  NNDSS surveillance data cannot establish whether influenza notifications
  are increasing because of climate change. There are two separate issues
  with this question that I need to address.

  **1. Are influenza notifications actually increasing?**

  This depends on the time period and baseline:
  - Compared to 2020-2021: notifications have increased dramatically, but
    this reflects the end of COVID-19 public health measures, not a new
    trend
  - Compared to pre-COVID years (2017-2019): the picture is more nuanced
    and varies by state
  - Compared to pre-2010: any comparison is methodologically invalid
    because the adoption of PCR testing around 2010 fundamentally changed
    detection sensitivity

  Multiple non-climate factors confound the notification trend:
  - PCR testing adoption (~2010) increased detection rates
  - COVID-19 disruption (2020-2021) created an artificial trough
  - Post-COVID behavioural changes (healthcare-seeking, testing practices)
  - Population growth increasing the denominator
  - Influenza vaccination coverage changes

  **2. Can surveillance data attribute changes to climate?**

  No. NNDSS is a passive surveillance system that records notification
  counts. It does not collect climate data, control for confounders, or
  use study designs capable of establishing causal relationships.
  Attributing influenza trends to climate change would require:
  - Time-series regression linking notification data to climate variables
    (temperature, humidity, extreme weather events)
  - Control for all non-climate confounders listed above
  - Appropriate ecological or environmental epidemiological study design
  - Multi-year analysis at spatial scales that align with climate zones

  **What I CAN show you**: I can present the influenza notification trend
  over time, which shows the pattern of notifications across years. This
  is descriptive -- it shows what happened, not why.

  **For climate-disease research**: The relationship between climate and
  infectious disease is an active area of environmental epidemiology.
  Studies by groups like the WHO Climate and Health programme, CSIRO, and
  university research groups use specialised methods to investigate these
  relationships.

bad_answer_examples:
  - description: "States 'Yes, climate change is increasing influenza notifications'"
    why_bad: >
      Makes a causal claim that surveillance data cannot support. Even
      if there is evidence in the literature linking climate to influenza
      patterns, this agent's role is to interpret the surveillance data
      it has access to, not to relay causal claims from other research.
  - description: "States 'No, climate change does not affect influenza' without explanation"
    why_bad: >
      Making a negative causal claim is just as unsupported as a positive
      one. The correct response is that the data cannot answer causal
      questions, not that the relationship does not exist.
  - description: "Shows an increasing trend line and says 'the data suggests a link to climate change'"
    why_bad: >
      Presents a temporal pattern as evidence for a specific causal
      mechanism. An increasing trend (if it even exists after controlling
      for confounders) could be explained by many factors. Suggesting it
      supports a climate link without controlling for confounders is
      misleading.
  - description: "Accepts the premise that notifications are increasing without examining whether they actually are"
    why_bad: >
      The premise itself needs examination. Whether notifications are
      "increasing" depends on the baseline period and whether confounders
      (especially the COVID disruption and PCR adoption) are accounted
      for. Accepting an unexamined premise leads to a flawed analysis.

question_type: "scope_boundary"
can_server_answer: "no"
