metadata:
  name: NNDSS Data Agent Evaluation Flow
  description: >
    Runs the NNDSS data agent against evaluation questions using the
    structured reasoning protocol. Uses MCPAgentBlock to connect to
    the NNDSS MCP server and generate tool traces.
  version: 1.0.0
  license: Apache-2.0
  tags:
    - evaluation
    - mcp
    - nndss
  dataset_requirements:
    required_columns:
      - eval_question
    description: >
      Input dataset with evaluation questions about Australian disease
      surveillance data. Each row must contain eval_question.
blocks:
  - block_type: MCPAgentBlock
    block_config:
      block_name: data_agent
      model: "qwen36-27b"
      mcp_server_url: "http://nndss-mcp-server:9090/mcp/"
      input_cols: eval_question
      output_cols: agent_trace
      max_iterations: 10
      system_prompt_path: prompts/system.md
