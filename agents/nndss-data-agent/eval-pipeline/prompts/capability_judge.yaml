- role: user
  content: |
    You are evaluating a data agent's response quality. Unlike a tool quality
    judge, you are not evaluating whether the data returned was correct. You
    are evaluating whether the agent REASONED correctly -- whether it applied
    the right methodology awareness, respected the scope boundaries of the
    data, and demonstrated the epistemological discipline that makes a data
    agent trustworthy.

    A correct final answer with poor reasoning scores lower than a thoughtful
    response that shows proper methodology consideration and honest scope
    acknowledgment, even if that thoughtful response reaches a less precise
    conclusion.

    <core_principles>

    1. **N/A is not a punishment and not a free pass.** When a dimension truly
       does not apply to a question, score N/A -- never 1, never 5. Use 1 only
       when the dimension applied AND the agent failed at it. Use 5 only when
       the agent demonstrated the full pattern described at level 5.

    2. **"No data available" refusals are a special case.** When the agent
       correctly determines that no dataset can answer the question and refuses
       on scope grounds, the methodology, causal-inference, geographic, and
       cross-dataset dimensions become inapplicable -- there is no dataset whose
       methodology, causal limits, or geographic scope can be discussed. Score
       these dimensions N/A. The dimensions that DO still apply: scope_adherence
       (the refusal itself) and confidence_calibration (the agent must still
       provide a confidence card).

    3. **Read the agent's full response before scoring 1.** A brief but correct
       statement counts. If the agent says "observational design cannot support
       causal claims" -- that satisfies causal_inference at level 4 even if
       expressed in one sentence.

    4. **Confidence calibration is always required.** This is the one dimension
       that never gets N/A. Every response, including refusals, must include a
       confidence card.

    </core_principles>

    <rubric>

    --- DIMENSION 1: cross_dataset_reasoning ---
    [Did the agent correctly determine which dataset(s) to use and why?]
    Score N/A: The question involves only one dataset and no comparison is
               needed, OR the agent correctly determined no dataset can answer
               this question. In both cases, cross-dataset reasoning does not
               apply.
    Score 1: Used wrong dataset without considering alternatives.
    Score 2: Used a dataset that works but didn't consider whether a better one
             exists.
    Score 3: Considered multiple datasets but made an incorrect or incomplete
             comparison.
    Score 4: Correctly identified the right dataset(s) and articulated the key
             trade-offs.
    Score 5: Demonstrated deep understanding of dataset differences
             (methodology, geographic level, temporal coverage) and recommended
             the optimal approach with clear reasoning.

    --- DIMENSION 2: methodology_awareness ---
    [Did the agent demonstrate understanding of how the data was collected?]
    Score N/A: The agent correctly determined no relevant data exists for this
               question (out-of-scope refusal).
    Score 1: Data WAS retrieved but the agent made no mention of methodology;
             presented data as if it speaks for itself.
    Score 2: Named the data source but showed no understanding of methodology.
    Score 3: Mentioned methodology basics (e.g., "sensor data") without
             specifics.
    Score 4: Described the collection design and connected it to
             interpretation.
    Score 5: Retrieved and applied per-indicator methodology; demonstrated
             understanding of specific nuances like calibration, population
             coverage, or temporal comparability.

    --- DIMENSION 3: scope_adherence ---
    [Did the agent stay within what the data can answer?]
    Score 1: Made claims the data cannot support (health recommendations,
             predictions, causal claims from observational data).
    Score 2: Mostly stayed within scope but supplemented with unsourced
             knowledge without disclaiming it.
    Score 3: Stayed within scope but failed to explicitly note what the data
             CANNOT answer.
    Score 4: Correctly identified scope boundaries and stated what the data can
             and cannot answer.
    Score 5: Proactively identified that the question is outside scope,
             explained why, and redirected to appropriate resources.

    --- DIMENSION 4: causal_inference_boundaries ---
    [Did the agent correctly handle causal claims or implications?]
    Score N/A: The question does not involve causal claims or implications, OR
               the agent correctly determined no relevant data exists.
    Score 1: Made or agreed to causal claims from observational data.
    Score 2: Hedged but still implied causation.
    Score 3: Noted correlation does not equal causation but didn't explain what
             study design would be needed.
    Score 4: Clearly stated the data shows associations not causation, named
             the kind of study needed. Brief but correct mentions count.
    Score 5: Explicitly identified the observational design as the reason
             causal claims aren't supportable, and offered to show what the
             data CAN tell you.

    --- DIMENSION 5: geographic_resolution_knowledge ---
    [Did the agent correctly handle geographic scope?]
    Score N/A: The question does not involve geographic specificity, OR the
               agent correctly determined no relevant dataset exists.
    Score 1: Presented data at wrong geographic level or claimed data exists at
             a level it doesn't.
    Score 2: Got the geographic level right but didn't explain limitations.
    Score 3: Noted geographic limitations but didn't explain WHY (sensor
             placement, sampling design).
    Score 4: Correctly explained geographic scope, why it's limited, and
             offered alternatives at other levels.
    Score 5: Demonstrated deep understanding of resolution differences across
             datasets and why they can't be compared directly.

    --- DIMENSION 6: terminology_fluency ---
    [Did the agent correctly map lay terms to domain-specific terminology?]
    Score N/A: The question uses standard terminology with no lay-term mapping
               needed, OR the agent correctly determined no relevant dataset
               exists.
    Score 1: Used wrong term or failed to find data because of a terminology
             mismatch, OR hallucinated terminology not present in the tool
             responses.
    Score 2: Found data but didn't bridge between the user's language and
             technical terminology.
    Score 3: Mapped terms correctly but didn't clarify for the user what the
             term means.
    Score 4: Correctly mapped lay terms to domain indicators and explained the
             mapping.
    Score 5: Mapped terms, explained the mapping, noted scope implications, and
             gently corrected imprecise user language.

    --- DIMENSION 7: confidence_calibration ---
    [Does the confidence card accurately reflect the context actually
    retrieved?]
    This dimension never gets N/A. Every response must include a confidence
    card, even refusals.
    Score 1: No confidence card at all, OR claims HIGH confidence with no
             methodology retrieved.
    Score 2: Confidence level doesn't match what was actually retrieved, OR
             card is present but mostly empty / boilerplate.
    Score 3: Confidence level is roughly right but the basis statement is
             vague.
    Score 4: Confidence level matches context, basis statement is specific.
    Score 5: Confidence level precisely reflects what was retrieved and what's
             missing; gaps are accurately identified.

    </rubric>

    <instructions>
    For each dimension that applies to this question:

    1. Read the agent's <reasoning> block and compare it against the
       gold_standard_reasoning. The reasoning block is your primary evidence.

    2. Check the agent's final answer against the good_answer to understand
       the expected substance. The good_answer is a reference, not a template.

    3. Use the relevant_capabilities field to determine which dimensions to
       score. Dimensions listed as not applicable (applies: false) must be
       scored "N/A".

    4. IMPORTANT: The agent may label a dimension as "N/A" in its reasoning
       block but still address it under a different label or in its answer.
       Evaluate based on the CONTENT, not the labels.

    5. For each scored dimension, cite specific evidence from the agent's
       reasoning or answer.

    6. Write the evaluation text as a short paragraph (2-4 sentences). Be
       specific.

    Grounding rules:
    - Do NOT echo placeholder syntax or template variables in your output.
    - Every evaluation field must reference actual content from the agent's
      response, not hypothetical content.
    - N/A dimensions must still have an evaluation string explaining why the
      dimension does not apply.
    </instructions>

    <examples>

    Example A: Strong response to "Does pollution from the factory cause
    respiratory problems in the neighborhood?"
    Expected scores: cross_dataset_reasoning=N/A, methodology_awareness=4,
    scope_adherence=5, causal_inference_boundaries=5,
    geographic_resolution_knowledge=N/A, terminology_fluency=N/A,
    confidence_calibration=4

    Agent reasoning block: "This question asks 'does X cause Y' -- this is a
    causal inference question. My available datasets are all observational
    monitoring data (Dataset A fixed monitors, Dataset B community sensors).
    Observational monitoring data can show pollutant levels and co-occurrence
    with health complaints, but establishing causation requires epidemiological
    studies or source apportionment analysis. I should refuse the causal
    framing, explain what the data cannot do and why, then offer related data
    I can provide: PM2.5 trends near the facility and regional baselines."

    {
      "cross_dataset_reasoning": "N/A",
      "cross_dataset_reasoning_evaluation": "This question does not involve a comparison between datasets -- it is a causal boundary question. The dimension does not apply.",
      "methodology_awareness": 4,
      "methodology_awareness_evaluation": "The agent explicitly referenced the monitoring methodology for both datasets and used it as the basis for refusal, noting that observational monitoring measures pollutant levels but does not establish health causation. It stops short of level 5 because it did not discuss specific measurement nuances like detection limits or calibration.",
      "scope_adherence": 5,
      "scope_adherence_evaluation": "The agent proactively identified that the question is outside scope, explained the specific reason (monitoring data measures levels, not health causation), and offered related in-scope data (PM2.5 trends and regional baselines).",
      "causal_inference_boundaries": 5,
      "causal_inference_boundaries_evaluation": "The agent explicitly named the observational design as the structural reason why causal claims are unsupportable, named the study designs that would be required (epidemiological studies, source apportionment), and offered to show what the data CAN provide.",
      "geographic_resolution_knowledge": "N/A",
      "geographic_resolution_knowledge_evaluation": "The question does not require geographic resolution analysis beyond what was already addressed in the scope refusal.",
      "terminology_fluency": "N/A",
      "terminology_fluency_evaluation": "The question uses standard terms. No terminology mapping was required.",
      "confidence_calibration": 4,
      "confidence_calibration_evaluation": "The agent's confidence card correctly signals LOW confidence in answering the causal question, with a specific basis. It would reach level 5 if it explicitly itemized what was retrieved versus what remained missing.",
      "overall_assessment": "Strong response that correctly identifies the causal inference boundary, grounds the refusal in monitoring methodology, and offers useful alternative data."
    }

    Example B: Weak response to "Should I use Dataset A or Dataset B for
    county-level trends?"
    Expected scores: cross_dataset_reasoning=2, methodology_awareness=1,
    scope_adherence=3, causal_inference_boundaries=N/A,
    geographic_resolution_knowledge=2, terminology_fluency=N/A,
    confidence_calibration=2

    Agent reasoning block: "The user wants county-level data. I'll recommend
    Dataset B because it has more data points."

    {
      "cross_dataset_reasoning": 2,
      "cross_dataset_reasoning_evaluation": "The agent chose between datasets but selected based on 'more data points' without articulating the methodological distinction between direct measurements (Dataset A) and modeled estimates (Dataset B). The reasoning was absent.",
      "methodology_awareness": 1,
      "methodology_awareness_evaluation": "The reasoning block contains no methodology analysis. 'More data points' is not a methodological observation.",
      "scope_adherence": 3,
      "scope_adherence_evaluation": "The agent stayed within the scope of dataset guidance but failed to note key limitations of the recommended dataset for this use case.",
      "causal_inference_boundaries": "N/A",
      "causal_inference_boundaries_evaluation": "This question asks for dataset selection guidance and does not involve causal claims.",
      "geographic_resolution_knowledge": 2,
      "geographic_resolution_knowledge_evaluation": "The agent understood the user wanted county-level data but did not explain the geographic resolution trade-offs between the two datasets.",
      "terminology_fluency": "N/A",
      "terminology_fluency_evaluation": "The question uses dataset names directly. No lay-term mapping was required.",
      "confidence_calibration": 2,
      "confidence_calibration_evaluation": "The agent presents its recommendation with implicit HIGH confidence despite having done no methodology retrieval.",
      "overall_assessment": "Weak response that selected a dataset without methodology analysis and presented an underexplained recommendation with misplaced confidence."
    }

    </examples>

    <output_format>
    Output a single JSON object with exactly these fields. Scores must be
    integers 1-5 or the string "N/A". Every evaluation field must be a
    concrete paragraph referencing actual content from the agent's response.

    {
      "cross_dataset_reasoning": <1-5 or "N/A">,
      "cross_dataset_reasoning_evaluation": "...",
      "methodology_awareness": <1-5>,
      "methodology_awareness_evaluation": "...",
      "scope_adherence": <1-5>,
      "scope_adherence_evaluation": "...",
      "causal_inference_boundaries": <1-5 or "N/A">,
      "causal_inference_boundaries_evaluation": "...",
      "geographic_resolution_knowledge": <1-5 or "N/A">,
      "geographic_resolution_knowledge_evaluation": "...",
      "terminology_fluency": <1-5 or "N/A">,
      "terminology_fluency_evaluation": "...",
      "confidence_calibration": <1-5>,
      "confidence_calibration_evaluation": "...",
      "overall_assessment": "<one sentence citing specific evidence>"
    }
    </output_format>

    <context>
    Now evaluate this specific agent response:

    Question: {{question}}
    Question type: {{question_type}}
    Server should be able to answer: {{can_server_answer}}
    Evaluation criteria: {{evaluation_criteria}}
    Relevant capabilities for this question: {{relevant_capabilities}}

    Gold standard answer (reference for expected substance):
    {{good_answer}}

    Gold standard reasoning chain (compare against agent's reasoning block):
    {{gold_standard_reasoning}}

    Agent reasoning block:
    {{agent_reasoning}}

    Agent final answer:
    {{agent_answer}}

    Tool interactions (what was called and what was returned):
    {{tool_interactions}}
    </context>

    Produce the JSON output now, grounding every evaluation field in actual
    content from the agent's response and reasoning block above.
