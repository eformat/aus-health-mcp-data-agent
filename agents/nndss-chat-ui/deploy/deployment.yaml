apiVersion: apps/v1
kind: Deployment
metadata:
  name: nndss-chat-ui
  labels:
    app.kubernetes.io/name: nndss-chat-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nndss-chat-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nndss-chat-ui
    spec:
      containers:
        - name: chat-ui
          image: quay.io/eformat/nndss-chat-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8501
              name: http
          env:
            - name: AGENT_URL
              value: "http://nndss-data-agent-agent-template:8080"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: 8501
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 10
